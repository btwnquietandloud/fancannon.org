<style>
  :root {
    --bg: #0b0d14;
    --surface: #141722;
    --surface-raised: #1c2030;
    --surface-hover: #252a3e;
    --border: #2a3050;
    --border-bright: #3d4670;
    --text: #e4e2f0;
    --text-dim: #7a7e99;
    --text-faint: #4e5270;
    --accent: #5b7cf7;
    --accent-light: #7e9bff;
    --accent-glow: rgba(91,124,247,0.2);
    --governor-r: #ef6b6b;
    --governor-r-bg: rgba(239,107,107,0.08);
    --governor-r-border: rgba(239,107,107,0.2);
    --governor-d: #5ba8ef;
    --governor-d-bg: rgba(91,168,239,0.08);
    --governor-d-border: rgba(91,168,239,0.2);
    --motto-gold: #f0c948;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 25% 20%, rgba(91,124,247,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 75% 80%, rgba(147,91,247,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  .app-header {
    text-align: center;
    padding: 2rem 1rem 0.5rem;
  }

  .app-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 3.5vw, 2.6rem);
    font-weight: 400;
    background: linear-gradient(135deg, #e4e2f0 10%, #7e9bff 55%, #c49bff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .app-header .subtitle {
    color: var(--text-dim);
    font-size: 0.88rem;
    font-weight: 300;
    margin-top: 0.25rem;
  }

  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 1rem 1rem 0.75rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.5rem 1.3rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
  }

  .filter-btn:hover {
    background: var(--surface-hover);
    border-color: var(--border-bright);
    color: var(--text);
  }

  .filter-btn.active {
    background: linear-gradient(135deg, #5b7cf7 0%, #7e5bf7 100%);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 2px 16px var(--accent-glow);
  }

  .map-section {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 0.5rem;
  }

  #map-container { width: 100%; }
  #map-container svg { width: 100%; height: auto; display: block; }

  .state-path {
    fill: var(--surface-raised);
    stroke: var(--border);
    stroke-width: 0.5;
    cursor: pointer;
    transition: fill 0.18s ease;
  }

  .state-path:hover {
    filter: brightness(1.4);
    stroke: var(--accent-light);
    stroke-width: 1.2;
  }

  .state-path.selected {
    filter: brightness(1.5) drop-shadow(0 0 6px var(--accent-glow));
    stroke: var(--accent);
    stroke-width: 1.8;
  }

  .state-label {
    font-family: 'Outfit', sans-serif;
    font-size: 9px;
    font-weight: 500;
    fill: var(--text-faint);
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: central;
  }

  .hint-text {
    text-align: center;
    color: var(--text-faint);
    font-size: 0.8rem;
    font-weight: 300;
    padding: 0.25rem 0 1.5rem;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--surface-raised);
    border: 1px solid var(--border-bright);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 200;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.12s, transform 0.12s;
    max-width: 320px;
    backdrop-filter: blur(12px);
  }

  .tooltip.visible { opacity: 1; transform: translateY(0); }

  .tooltip .tt-state {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
  }

  .tooltip .tt-abbr {
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--text-faint);
    letter-spacing: 0.12em;
    margin-bottom: 0.5rem;
  }

  .tooltip .tt-label {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.1rem;
  }

  .tooltip .tt-governor { font-size: 0.95rem; font-weight: 500; }

  .tt-party, .panel-party {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 600;
    padding: 0.1rem 0.5rem;
    border-radius: 999px;
    margin-left: 0.4rem;
    vertical-align: middle;
  }

  .tt-party.R, .panel-party.R {
    background: var(--governor-r-bg);
    color: var(--governor-r);
    border: 1px solid var(--governor-r-border);
  }

  .tt-party.D, .panel-party.D {
    background: var(--governor-d-bg);
    color: var(--governor-d);
    border: 1px solid var(--governor-d-border);
  }

  .tooltip .tt-motto {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--motto-gold);
    line-height: 1.35;
  }

  .tooltip .tt-motto-en, .panel-motto-en {
    font-size: 0.82rem;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 0.15rem;
  }

  /* Bottom panel */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  .info-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 1.2rem 1.8rem 2rem;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 100;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
    border-radius: 20px 20px 0 0;
  }

  .info-panel.open { transform: translateY(0); }

  .info-panel .drag-indicator {
    width: 36px; height: 4px;
    border-radius: 2px;
    background: var(--border-bright);
    margin: 0 auto 1rem;
  }

  .info-panel .close-btn {
    position: absolute;
    top: 0.8rem; right: 1rem;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 1rem;
    cursor: pointer;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    transition: all 0.2s;
  }

  .info-panel .close-btn:hover {
    background: var(--surface-hover);
    color: var(--text);
  }

  .panel-state-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    margin-bottom: 0.05rem;
  }

  .panel-abbr {
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--text-faint);
    letter-spacing: 0.12em;
    margin-bottom: 0.8rem;
  }

  .panel-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.15rem;
  }

  .panel-governor {
    font-size: 1.15rem;
    font-weight: 500;
  }

  .panel-motto {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    color: var(--motto-gold);
    line-height: 1.4;
  }

  .loading {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-dim);
    font-weight: 300;
  }

  .spinner {
    display: inline-block;
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 0.75rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .app-header { padding: 1.2rem 1rem 0.3rem; }
    .state-label { font-size: 6.5px; }
  }

  /* Governor legend */
  .gov-legend {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    flex-wrap: wrap;
    padding: 0.4rem 1rem 0;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-dim);
  }

  .gov-legend .leg-item {
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }

  .gov-legend .swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .fc-brand-bar{position:sticky;top:0;z-index:100;background:rgba(10,9,12,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06);padding:8px 16px;display:flex;align-items:center;gap:10px}
  .fc-brand-bar a{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
  .fc-brand-bar img{width:32px;height:32px;border-radius:50%}
  .fc-brand-bar span{font-family:sans-serif;font-size:14px;font-weight:600;color:#c9a44a;letter-spacing:0.5px}
  .fc-brand-bar .fc-sep{color:rgba(255,255,255,0.15);font-size:18px;font-weight:300}
  .fc-brand-bar .fc-page-name{font-size:13px;font-weight:500;color:rgba(255,255,255,0.4)}
</style>
</head>

let currentFilter = 'governor';
let selectedFips = null;
const tooltip = document.getElementById('tooltip');
const isTouchDevice = 'ontouchstart' in window;

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.filter === filter));
  applyMapColors();
  if (selectedFips) showPanel(selectedFips);
}

function applyMapColors() {
  d3.selectAll('.state-path').each(function(d) {
    const el = d3.select(this);
    const data = stateData[d.id];
    if (!data) return;
    if (currentFilter === 'governor') {
      const colors = {'R':{male:'#8b2030',female:'#c75068'},'D':{male:'#1e4a8a',female:'#4a8ad4'}};
      const c = colors[data.party];
      el.style('fill', data.female ? c.female : c.male);
    } else if (currentFilter === 'crime') {
      const rate = crimeData[d.id] || 5;
      // Green (safe) to red (dangerous): 0-20 scale
      const t = Math.min(rate / 20, 1);
      const r = Math.round(40 + t * 200);
      const g = Math.round(180 - t * 150);
      const b = Math.round(80 - t * 50);
      el.style('fill', 'rgb('+r+','+g+','+b+')');
    } else if (currentFilter === 'corn') {
      const bushels = cornData[d.id] || 0;
      // Scale: 0 = dark, 2680 (Iowa max) = bright yellow
      const t = Math.min(bushels / 2680, 1);
      if (bushels === 0) {
        el.style('fill', '#1c2030');
      } else {
        const r = Math.round(30 + t * 225);
        const g = Math.round(30 + t * 190);
        const b = Math.round(20 + t * 10);
        el.style('fill', 'rgb('+r+','+g+','+b+')');
      }
    } else if (currentFilter === 'dino') {
      var dd = dinoData[d.id];
      if (dd && dd.type !== 'None') {
        var isDino = dd.type.indexOf('Dinosaur') >= 0;
        el.style('fill', isDino ? '#c06030' : '#708060');
      } else {
        el.style('fill', '#1c2030');
      }
    } else {
      el.style('fill', null);
    }
  });
  const legend = document.getElementById('gov-legend');
  if (legend) legend.style.display = currentFilter === 'governor' ? 'flex' : 'none';
}

function buildContent(data, type, fips) {
  const labelStyle = 'font-size:0.6rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.1rem;';
  if (type === 'governor') {
    return `<div style="${labelStyle}">Governor</div>
      <div style="font-size:0.95rem;font-weight:500;">${data.governor}<span class="tt-party ${data.party}">${data.party === 'R' ? 'Republican' : 'Democrat'}</span></div>`;
  }
  if (type === 'nickname') {
    return `<div style="${labelStyle}">Nickname</div>
      <div style="font-family:'DM Serif Display',serif;font-size:1.05rem;color:#7ecbab;line-height:1.35;">${data.nickname}</div>`;
  }
  if (type === 'bird') {
    return `<div style="${labelStyle}">State Bird</div>
      <div style="font-size:0.95rem;font-weight:500;color:#e8a4e0;">${data.bird}</div>`;
  }
  if (type === 'sport') {
    const s = sportData[fips] || {};
    const isNone = s.sport === 'None designated';
    return `<div style="${labelStyle}">State Sport</div>
      <div style="font-size:0.95rem;font-weight:600;color:${isNone ? 'var(--text-dim)' : '#f09856'};">${s.sport || 'Unknown'}</div>`;
  }
  if (type === 'flower') {
    const f = flowerData[fips] || {};
    return `<div style="${labelStyle}">State Flower</div>
      <div style="font-size:0.95rem;font-weight:500;color:#f0a0c0;">${f.flower || 'Unknown'}</div>`;
  }
  if (type === 'crime') {
    const rate = crimeData[fips] || 0;
    const color = rate > 10 ? '#ef6b6b' : rate > 6 ? '#f0c060' : '#6bcb77';
    return `<div style="${labelStyle}">Homicide Rate (2023)</div>
      <div style="font-size:0.95rem;font-weight:600;color:${color};">${rate} per 100,000</div>`;
  }
  if (type === 'corn') {
    const b = cornData[fips] || 0;
    const color = b > 500 ? '#f0c948' : b > 0 ? '#a0a060' : 'var(--text-dim)';
    return `<div style="${labelStyle}">Corn Production (2024)</div>
      <div style="font-size:0.95rem;font-weight:600;color:${color};">${b > 0 ? b.toLocaleString() + 'M bushels' : 'Minimal/None'}</div>`;
  }
  if (type === 'dino') {
    const dd = dinoData[fips] || {};
    return '<div style="' + labelStyle + '">' + (dd.type||'Fossil') + '</div><div style="font-size:0.95rem;font-weight:500;color:#c09060;">' + (dd.name||'None designated') + '</div>';
  }
  if (type === 'animal') {
    const aa = animalData[fips] || {};
    return '<div style="' + labelStyle + '">State Animal</div><div style="font-size:0.95rem;font-weight:500;color:#80c0a0;">' + (aa.animal||'None') + '</div>';
  }
  if (type === 'wonder') {
    const ww = wonderData[fips] || '';
    return '<div style="' + labelStyle + '">Natural Wonder</div><div style="font-size:0.95rem;font-weight:500;color:#70b0e0;">' + (ww ? ww.split(' — ')[0] : 'Unknown') + '</div>';
  }
  if (type === 'parks') {
    const pp = parksData[fips] || '';
    return '<div style="' + labelStyle + '">Top Attraction</div><div style="font-size:0.95rem;font-weight:500;color:#e0a060;">' + (pp ? pp.split(' — ')[0] : 'Unknown') + '</div>';
  }
  if (type === 'weird') {
    const wl = weirdData[fips] || '';
    return '<div style="' + labelStyle + '">Weird Law</div><div style="font-size:0.88rem;font-weight:500;color:#d0a0d0;line-height:1.4;">' + (wl || 'None found') + '</div>';
  }
  let h = `<div style="${labelStyle}">State Motto</div>
    <div style="font-family:'DM Serif Display',serif;font-size:1rem;color:var(--motto-gold);line-height:1.35;">\u201C${data.motto}\u201D</div>`;
  if (data.mottoEn) h += `<div style="font-size:0.82rem;color:var(--text-dim);font-style:italic;margin-top:0.15rem;">${data.mottoEn}</div>`;
  return h;
}

function showTooltip(event, fips) {
  if (isTouchDevice) return;
  const data = stateData[fips];
  if (!data) return;
  tooltip.innerHTML = `<div style="font-family:'DM Serif Display',serif;font-size:1.15rem;">${data.name}</div>
    <div style="font-size:0.6rem;font-weight:600;color:var(--text-faint);letter-spacing:0.12em;margin-bottom:0.5rem;">${data.abbr}</div>
    ${buildContent(data, currentFilter, fips)}`;
  tooltip.classList.add('visible');
  positionTooltip(event);
}

function positionTooltip(event) {
  const pad = 14;
  const r = tooltip.getBoundingClientRect();
  let x = event.clientX + pad, y = event.clientY + pad;
  if (x + r.width > window.innerWidth - 10) x = event.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 10) y = event.clientY - r.height - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() { tooltip.classList.remove('visible'); }

function showPanel(fips) {
  const data = stateData[fips];
  if (!data) return;
  selectedFips = fips;
  d3.selectAll('.state-path').classed('selected', false);
  d3.select(`#state-${fips}`).classed('selected', true);

  let html = `<div class="panel-state-name">${data.name}</div><div class="panel-abbr">${data.abbr}</div>`;
  if (currentFilter === 'governor') {
    const facts = govFacts[fips] || [];
    html += `<div class="panel-label">Current Governor</div>
      <div class="panel-governor">${data.governor}<span class="panel-party ${data.party}">${data.party === 'R' ? 'Republican' : 'Democrat'}</span></div>`;
    if (facts.length) {
      html += `<div style="margin-top:0.8rem;">
        <div class="panel-label">Fun Facts</div>
        <div style="font-size:0.88rem;color:var(--text);line-height:1.55;margin-top:0.3rem;border-left:2px solid var(--accent);padding-left:0.75rem;">${facts[0]}</div>
        <div style="font-size:0.88rem;color:var(--text);line-height:1.55;margin-top:0.5rem;border-left:2px solid var(--accent);padding-left:0.75rem;">${facts[1]}</div>
      </div>`;
    }
  } else if (currentFilter === 'motto') {
    html += `<div class="panel-label">State Motto</div>
      <div class="panel-motto">\u201C${data.motto}\u201D</div>`;
    if (data.mottoEn) html += `<div class="panel-motto-en">${data.mottoEn}</div>`;
    var mo = mottoOrigin[fips];
    if (mo) html += '<div style="margin-top:0.8rem;"><div class="panel-label">Origin &amp; Meaning</div><div style="font-size:0.88rem;color:var(--text);line-height:1.55;margin-top:0.3rem;border-left:2px solid var(--motto-gold);padding-left:0.75rem;">' + mo + '</div></div>';
  } else if (currentFilter === 'nickname') {
    html += `<div class="panel-label">State Nickname</div>
      <div style="font-family:'DM Serif Display',serif;font-size:1.3rem;color:#7ecbab;margin-top:0.2rem;">${data.nickname}</div>`;
    var no = nicknameOrigin[fips];
    if (no) html += '<div style="margin-top:0.8rem;"><div class="panel-label">Why This Nickname?</div><div style="font-size:0.88rem;color:var(--text);line-height:1.55;margin-top:0.3rem;border-left:2px solid #7ecbab;padding-left:0.75rem;">' + no + '</div></div>';
  } else if (currentFilter === 'bird') {
    html += `<div class="panel-label">State Bird</div>
      <div style="font-size:1.2rem;font-weight:500;color:#e8a4e0;margin-top:0.2rem;">${data.bird}</div>`;
    var bo = birdOrigin[fips];
    if (bo) html += '<div style="margin-top:0.8rem;"><div class="panel-label">Why This Bird?</div><div style="font-size:0.88rem;color:var(--text);line-height:1.55;margin-top:0.3rem;border-left:2px solid #e8a4e0;padding-left:0.75rem;">' + bo + '</div></div>';
  } else if (currentFilter === 'sport') {
    const s = sportData[fips] || {};
    const isNone = s.sport === 'None designated';
    html += `<div class="panel-label">State Sport</div>
      <div style="font-size:1.2rem;font-weight:600;color:${isNone ? 'var(--text-dim)' : '#f09856'};margin-top:0.2rem;">${s.sport || 'Unknown'}</div>
      <div style="font-size:0.88rem;color:var(--text-dim);margin-top:0.5rem;line-height:1.5;">${s.desc || ''}</div>
      <div style="font-size:0.85rem;color:var(--text);margin-top:0.6rem;line-height:1.5;border-left:2px solid ${isNone ? 'var(--border)' : '#f09856'};padding-left:0.75rem;">${s.origin || ''}</div>`;
  } else if (currentFilter === 'flower') {
    const f = flowerData[fips] || {};
    html += `<div class="panel-label">State Flower</div>
      <div style="font-size:1.2rem;font-weight:500;color:#f0a0c0;margin-top:0.2rem;">${f.flower || 'Unknown'}</div>`;
    if (f.facts && f.facts.length) {
      html += '<div style="margin-top:0.8rem;"><div class="panel-label">Why This Flower?</div>';
      f.facts.forEach(function(fact) {
        html += '<div style="font-size:0.88rem;color:var(--text);line-height:1.55;margin-top:0.4rem;border-left:2px solid #f0a0c0;padding-left:0.75rem;">' + fact + '</div>';
      });
      html += '</div>';
    }
  } else if (currentFilter === 'crime') {
    const rate = crimeData[fips] || 0;
    const natAvg = 5.7;
    const color = rate > 10 ? '#ef6b6b' : rate > 6 ? '#f0c060' : '#6bcb77';
    const label = rate > 10 ? 'Above Average' : rate > 6 ? 'Near Average' : 'Below Average';
    const diff = ((rate - natAvg) / natAvg * 100).toFixed(0);
    html += '<div class="panel-label">Homicide Rate (2023, per 100,000)</div>' +
      '<div style="font-size:1.4rem;font-weight:600;color:' + color + ';margin-top:0.2rem;">' + rate + '</div>' +
      '<div style="font-size:0.85rem;color:var(--text-dim);margin-top:0.3rem;">' + label + ' — National avg: ' + natAvg + ' per 100,000</div>' +
      '<div style="font-size:0.85rem;color:var(--text);margin-top:0.5rem;line-height:1.5;border-left:2px solid ' + color + ';padding-left:0.75rem;">' +
      (rate > natAvg ? Math.abs(diff) + '% above' : Math.abs(diff) + '% below') + ' the national average. ' +
      (rate <= 3 ? 'One of the safest states in the country.' : rate <= 6 ? 'Relatively safe by national standards.' : rate <= 10 ? 'Moderate homicide rate.' : 'Among the higher rates nationally.') + '</div>';
  } else if (currentFilter === 'corn') {
    const b = cornData[fips] || 0;
    const color = b > 1000 ? '#f0c948' : b > 100 ? '#c0a030' : b > 0 ? '#808040' : 'var(--text-dim)';
    const rank = Object.values(cornData).filter(function(v){return v > b}).length + 1;
    html += '<div class="panel-label">Corn Production (2024 est.)</div>' +
      '<div style="font-size:1.4rem;font-weight:600;color:' + color + ';margin-top:0.2rem;">' + (b > 0 ? b.toLocaleString() + ' million bushels' : 'Minimal / None') + '</div>' +
      '<div style="font-size:0.85rem;color:var(--text-dim);margin-top:0.3rem;">Rank: #' + rank + ' of 50 states</div>' +
      '<div style="font-size:0.85rem;color:var(--text);margin-top:0.5rem;line-height:1.5;border-left:2px solid ' + color + ';padding-left:0.75rem;">' +
      (b >= 2000 ? 'A corn belt powerhouse — one of the top producers in the nation.' : b >= 500 ? 'Major corn-producing state in the heart of the Corn Belt.' : b >= 100 ? 'Significant corn production contributing to the national supply.' : b > 0 ? 'Modest corn production, not a primary crop for this state.' : 'Little to no commercial corn production.') + '</div>';
  } else if (currentFilter === 'dino') {
    const dd = dinoData[fips] || {};
    html += '<div class="panel-label">' + (dd.type||'State Fossil') + '</div>' +
      '<div style="font-size:1.2rem;font-weight:500;color:#c09060;margin-top:0.2rem;">' + (dd.name||'None designated') + '</div>' +
      '<div style="font-size:0.88rem;color:var(--text);margin-top:0.5rem;line-height:1.55;border-left:2px solid #c09060;padding-left:0.75rem;">' + (dd.fact||'') + '</div>';
  } else if (currentFilter === 'animal') {
    const aa = animalData[fips] || {};
    html += '<div class="panel-label">State Animal / Mammal</div>' +
      '<div style="font-size:1.2rem;font-weight:500;color:#80c0a0;margin-top:0.2rem;">' + (aa.animal||'None designated') + '</div>' +
      (aa.weight && aa.weight !== 'N/A' ? '<div style="font-size:0.85rem;color:var(--text-dim);margin-top:0.3rem;">Weight: ' + aa.weight + '</div>' : '') +
      '<div style="font-size:0.88rem;color:var(--text);margin-top:0.5rem;line-height:1.55;border-left:2px solid #80c0a0;padding-left:0.75rem;">' + (aa.fact||'') + '</div>';
  } else if (currentFilter === 'wonder') {
    const ww = wonderData[fips] || '';
    const parts = ww.split(' — ');
    html += '<div class="panel-label">Natural Wonder</div>' +
      '<div style="font-size:1.2rem;font-weight:500;color:#70b0e0;margin-top:0.2rem;">' + (parts[0]||'Unknown') + '</div>' +
      '<div style="font-size:0.88rem;color:var(--text);margin-top:0.5rem;line-height:1.55;border-left:2px solid #70b0e0;padding-left:0.75rem;">' + (parts[1]||'') + '</div>';
  } else if (currentFilter === 'parks') {
    const pp = parksData[fips] || '';
    const parts = pp.split(' — ');
    html += '<div class="panel-label">Top Kid-Friendly Attraction</div>' +
      '<div style="font-size:1.2rem;font-weight:500;color:#e0a060;margin-top:0.2rem;">' + (parts[0]||'Unknown') + '</div>' +
      '<div style="font-size:0.88rem;color:var(--text);margin-top:0.5rem;line-height:1.55;border-left:2px solid #e0a060;padding-left:0.75rem;">' + (parts[1]||'') + '</div>';
  } else if (currentFilter === 'weird') {
    const wl = weirdData[fips] || 'No weird law found for this state.';
    html += '<div class="panel-label">Weird State Law</div>' +
      '<div style="font-size:1.1rem;font-weight:500;color:#d0a0d0;margin-top:0.2rem;line-height:1.5;">' + wl + '</div>' +
      '<div style="font-size:0.82rem;color:var(--text-dim);margin-top:0.6rem;font-style:italic;">Note: Many of these are outdated laws that remain technically on the books!</div>';
  }
  document.getElementById('panel-content').innerHTML = html;
  document.getElementById('info-panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  d3.selectAll('.state-path').classed('selected', false);
  selectedFips = null;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ============ D3 MAP RENDERING ============
async function loadMap() {
  try {
    let res;
    try {
      res = await fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-albers-10m.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
    } catch(e1) {
      try {
        res = await fetch('https://unpkg.com/us-atlas@3.0.1/states-albers-10m.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
      } catch(e2) {
        throw new Error('Could not load map data: ' + (e1.message || 'network error'));
      }
    }
    const us = await res.json();
    const container = document.getElementById('map-container');
    container.innerHTML = '';

    const svg = d3.select(container).append('svg')
      .attr('viewBox', '0 0 975 610')
      .attr('preserveAspectRatio', 'xMidYMid meet');

    const path = d3.geoPath();
    const states = topojson.feature(us, us.objects.states);

    svg.append('g').selectAll('path')
      .data(states.features)
      .join('path')
      .attr('class', 'state-path')
      .attr('id', d => `state-${d.id}`)
      .attr('d', path)
      .on('mouseenter', (event, d) => showTooltip(event, d.id))
      .on('mousemove', (event) => positionTooltip(event))
      .on('mouseleave', () => hideTooltip())
      .on('click', (event, d) => { hideTooltip(); showPanel(d.id); });

    // State borders
    svg.append('path')
      .datum(topojson.mesh(us, us.objects.states, (a, b) => a !== b))
      .attr('fill', 'none').attr('stroke', 'var(--border)').attr('stroke-width', 0.6)
      .attr('stroke-linejoin', 'round').attr('pointer-events', 'none').attr('d', path);

    // Nation outline
    svg.append('path')
      .datum(topojson.mesh(us, us.objects.nation))
      .attr('fill', 'none').attr('stroke', 'var(--border-bright)').attr('stroke-width', 1.2)
      .attr('stroke-linejoin', 'round').attr('pointer-events', 'none').attr('d', path);

    // Labels
    const offsets = {
      "09":[34,2],"10":[30,6],"24":[34,-2],"25":[38,-3],"33":[22,-8],
      "34":[28,3],"44":[36,1],"50":[18,-12],"11":[40,14]
    };

    svg.append('g').selectAll('text')
      .data(states.features.filter(d => stateData[d.id]))
      .join('text')
      .attr('class', 'state-label')
      .attr('x', d => { const c = path.centroid(d); const o = offsets[d.id]; return c[0] + (o ? o[0] : 0); })
      .attr('y', d => { const c = path.centroid(d); const o = offsets[d.id]; return c[1] + (o ? o[1] : 0); })
      .text(d => stateData[d.id].abbr);

    // Apply initial governor colors
    applyMapColors();

  } catch (err) {
    document.getElementById('map-container').innerHTML =
      '<div class="loading" style="color:var(--governor-r)">Failed to load map: ' + err.message + '<br><br><button onclick="loadMap()" style="padding:8px 24px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;font-size:14px">Retry</button></div>';
  }
}

loadMap();
</script>
