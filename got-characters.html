<style>
:root{--bg:#0a0c14;--card:#10131e;--card2:#161a28;--accent:#c8a050;--accent2:#a04040;--accent3:#4080b0;--text:#d8d0c4;--muted:#908878;--dim:#605848;--border:#2a2420;--ice:#6090c0;--fire:#c06030;--gold:#d4a840;--stark:#708090;--lannister:#b8860b;--targaryen:#8b0000;--baratheon:#2f4f4f;--greyjoy:#3a5060;--tyrell:#5a8040;--martell:#c07030;--nw:#2a2a3a;--other:#806848}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(200,160,80,0.02) 0%,transparent 70%);pointer-events:none}
.fc-brand-bar{position:sticky;top:0;z-index:100;background:rgba(10,12,20,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,160,80,0.08);padding:8px 16px;display:flex;align-items:center;gap:10px}
.fc-brand-bar a{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}.fc-brand-bar img{width:32px;height:32px;border-radius:50%}
.fc-brand-bar span{font-family:sans-serif;font-size:14px;font-weight:600;color:#c9a44a;letter-spacing:0.5px}
.fc-brand-bar .fc-sep{color:rgba(255,255,255,0.12);font-size:18px}.fc-brand-bar .fc-page-name{font-size:13px;font-weight:500;color:rgba(255,255,255,0.3)}
.container{position:relative;z-index:1;max-width:950px;margin:0 auto;padding:24px 16px 80px}
.back-link{display:inline-block;color:var(--accent);text-decoration:none;font-size:13px;font-weight:600;padding:6px 14px;border:1px solid var(--border);border-radius:99px;transition:all .2s;margin-bottom:16px}.back-link:hover{border-color:var(--accent)}

.hero p{color:var(--muted);font-size:14px;margin-top:8px;line-height:1.6}

.search-box{flex:1;min-width:200px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.search-box:focus{border-color:var(--accent)}.search-box::placeholder{color:var(--dim)}

.hf-btn:hover{border-color:var(--accent);color:var(--text)}
.hf-btn.active{color:#fff;border-color:var(--hf-color,var(--accent))}
.hf-btn.active.h-all{background:var(--accent);border-color:var(--accent);color:#0a0c14}
.hf-btn.active.h-stark{background:var(--stark);border-color:var(--stark)}
.hf-btn.active.h-lannister{background:var(--lannister);border-color:var(--lannister);color:#0a0c14}
.hf-btn.active.h-targaryen{background:var(--targaryen);border-color:var(--targaryen)}
.hf-btn.active.h-baratheon{background:var(--baratheon);border-color:var(--baratheon)}
.hf-btn.active.h-greyjoy{background:var(--greyjoy);border-color:var(--greyjoy)}
.hf-btn.active.h-tyrell{background:var(--tyrell);border-color:var(--tyrell)}
.hf-btn.active.h-martell{background:var(--martell);border-color:var(--martell);color:#0a0c14}
.hf-btn.active.h-nw{background:var(--nw);border-color:#4a4a5a}

.hf-btn.active.h-other{background:var(--other);border-color:var(--other)}
.count{font-size:12px;color:var(--dim);margin-bottom:12px}

.cc{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .25s}
.cc:hover{border-color:var(--accent);transform:translateY(-2px)}
.cc-head{padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.cc-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.cc-emoji{font-size:26px}
.cc-name{font-family:'Cinzel',serif;font-size:17px;font-weight:700;flex:1}
.cc-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:0.05em}
.badge-stark{background:rgba(112,128,144,0.15);color:var(--stark)}

.badge-baratheon{background:rgba(47,79,79,0.15);color:#5f9f9f}
.badge-greyjoy{background:rgba(58,80,96,0.15);color:#6a9ab0}
.badge-tyrell{background:rgba(90,128,64,0.15);color:var(--tyrell)}
.badge-martell{background:rgba(192,112,48,0.15);color:var(--martell)}
.badge-nw{background:rgba(42,42,58,0.2);color:#8888a0}
.badge-villains{background:rgba(160,64,64,0.15);color:var(--accent2)}
.badge-other{background:rgba(128,104,72,0.15);color:var(--other)}
.cc-actor{font-size:11px;color:var(--dim)}
.cc-body{padding:16px 20px 18px}
.cc-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:10px}
.cc-section{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.04)}
.cc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim);margin-bottom:4px}
.cc-bvs{font-size:12px;color:var(--muted);line-height:1.6}
.cc-facts{list-style:none;margin-top:4px}
.cc-facts li{font-size:12px;color:var(--muted);line-height:1.5;padding:3px 0 3px 16px;position:relative}
.cc-facts li::before{content:'⚡';position:absolute;left:0;font-size:10px}
.cc-empty{text-align:center;padding:40px;color:var(--dim);font-size:14px;grid-column:1/-1}
@media(max-width:600px){.char-grid{grid-template-columns:1fr}.controls{flex-direction:column}.search-box{min-width:100%}}

<div class="hero"><h1>CHARACTER GUIDE</h1><p>100 characters from A Song of Ice and Fire / Game of Thrones — filter by house, search by name.</p></div>

<script>
var C=[
// ═══ HOUSE STARK ═══
{n:"Eddard 'Ned' Stark",e:"🐺",h:"stark",a:"Sean Bean",d:"The Lord of Winterfell whose rigid honor led him to King's Landing and his death. Ned discovered the truth about Cersei's children and paid for it with his head. His execution in Season 1 announced to the world that Game of Thrones plays by different rules.",bvs:"Book-Ned has more internal monologue showing his political naivety. The show captures his honor but loses his grief over the Tower of Joy promise to Lyanna.",f:["Sean Bean was cast partly because audiences expect him to die in movies — making Ned's execution both shocking and inevitable.","Martin wrote Ned's death early in the series specifically to signal that no character is safe."]},
{n:"Jon Snow",e:"🐺",h:"stark",a:"Kit Harington",d:"Raised as Ned's bastard, actually Aegon Targaryen — son of Rhaegar and Lyanna. Lord Commander of the Night's Watch, resurrected from death, King in the North, and the man who kills Daenerys to save the realm. His honor is both his strength and his curse.",bvs:"Book-Jon is more politically savvy and morally gray. His assassination by the Night's Watch is more clearly motivated. His parentage (R+L=J) remains unconfirmed in the books.",f:["Kit Harington had to keep Jon's resurrection secret for months — even from his own family.","Jon's 'you know nothing' catchphrase appears only once in the books but became the show's most quoted line."]},
{n:"Arya Stark",e:"🗡️",h:"stark",a:"Maisie Williams",d:"The girl who became No One — then chose to be Arya Stark. Trained by the Faceless Men, driven by a kill list, but ultimately the one who kills the Night King. Her journey from tomboy princess to deadly assassin is the series' most complete transformation.",bvs:"Book-Arya's Braavos training is longer and darker. She has active warging abilities — seeing through Nymeria and even cats. The show simplifies the Faceless Men arc significantly.",f:["Maisie Williams was 12 when she was cast and 22 when the show ended — she literally grew up as Arya.","Arya killing the Night King was a late decision; it was originally planned for Jon Snow."]},
{n:"Sansa Stark",e:"👑",h:"stark",a:"Sophie Turner",d:"From naive girl dreaming of princes to Queen in the North. Sansa's education comes from the cruelest teachers — Cersei, Littlefinger, Ramsay. She survives them all and becomes the leader Winterfell needs.",bvs:"The show merges Sansa with Jeyne Poole for the Ramsay Bolton marriage. Book-Sansa remains in the Vale with Littlefinger through AFFC/ADWD. Her entire Winterfell-Ramsay arc is show-only.",f:["Sophie Turner adopted Lady, the direwolf who played her on-screen pet, after the animal was retired from filming.","Turner was only 13 when cast and says Sansa taught her more about resilience than any real-life experience."]},
{n:"Bran Stark",e:"🌳",h:"stark",a:"Isaac Hempstead Wright",d:"The boy who fell from a tower and became a god. Bran's journey from crippled child to the Three-Eyed Raven — and eventually King of Westeros — is the series' most mystical arc. He sees everything, but feels increasingly little.",bvs:"Book-Bran's warging is far more developed — he controls Hodor, Summer, and even ravens. His transformation into the Three-Eyed Raven is ongoing. Martin confirmed the 'Bran as King' ending came from him.",f:["Bran was absent from the entire Season 5 — the longest any main character went missing.","Isaac Hempstead Wright nearly quit acting during the show's run and considered studying neuroscience instead."]},
{n:"Catelyn Stark",e:"🐟",h:"stark",a:"Michelle Fairley",d:"The fierce mother of the Stark children whose love and grief drive her to increasingly desperate acts. Her arrest of Tyrion sparks the War of the Five Kings. Her death at the Red Wedding is one of the show's most devastating moments.",bvs:"In the books, Catelyn is resurrected as Lady Stoneheart — an undead vengeful figure leading the Brotherhood Without Banners. The show cut this entirely, one of the most controversial omissions.",f:["Michelle Fairley's screaming performance at the Red Wedding was done in a single take.","Lady Stoneheart's absence from the show upset fans so much that 'LSH' became a recurring hashtag after every season finale."]},
{n:"Robb Stark",e:"⚔️",h:"stark",a:"Richard Madden",d:"The Young Wolf. King in the North who won every battle but lost the war — undone by love, broken oaths, and the Red Wedding. His death proved that being a military genius means nothing if you can't play the political game.",bvs:"Book-Robb marries Jeyne Westerling out of honor after sleeping with her. Show-Robb marries Talisa for love. Both die at the Red Wedding, but the motivations differ significantly.",f:["Richard Madden went on to star in Bodyguard and the MCU's Eternals — both roles were partly offered because of his GoT fame.","The Red Wedding episode caused so many angry social media posts that 'Red Wedding reaction videos' became a YouTube genre."]},
{n:"Rickon Stark",e:"🐺",h:"stark",a:"Art Parkinson",d:"The youngest Stark, barely a character in the show — remembered mainly for running in a straight line. In the books he's hidden on the cannibal island of Skagos, suggesting a much larger role in The Winds of Winter.",bvs:"Book-Rickon is taken to Skagos by Osha and may become a key political piece. The show gives him almost nothing before his death at the Battle of the Bastards.",f:["'Why didn't he zigzag?' became one of the show's most enduring memes after Ramsay's arrow scene.","Art Parkinson was only 8 when he was cast as Rickon."]},

// ═══ HOUSE LANNISTER ═══
{n:"Tyrion Lannister",e:"🦁",h:"lannister",a:"Peter Dinklage",d:"The Imp. Despised by his father, mocked for his dwarfism, but the most intelligent person in Westeros. His wit is his weapon, his compassion his secret strength. Drinks and knows things.",bvs:"Book-Tyrion becomes much darker after killing Tywin — bitter, vengeful, and alcoholic. The show keeps him sympathetic throughout. Book-Tyrion also lost most of his nose at Blackwater, not just a scar.",f:["Peter Dinklage was Martin's first and only choice. Martin wrote: 'No matter what else you do, please get Peter Dinklage.'","Dinklage won four Emmys for the role — the most for any GoT actor."]},
{n:"Cersei Lannister",e:"👑",h:"lannister",a:"Lena Headey",d:"The Lioness. A queen who wanted the power her gender denied her, and destroyed everything to get it. Her love for her children is genuine; her methods are monstrous. The most dangerous woman in Westeros.",bvs:"Book-Cersei is a POV character in AFFC, revealing her as far less competent than she believes — paranoid and making catastrophic errors. The show makes her more calculating and formidable.",f:["Lena Headey's walk of shame was performed by a body double for the nude scenes, with Headey's face digitally composited.","Headey was paid $1.2 million per episode in the final seasons — despite having some of the least dialogue."]},
{n:"Jaime Lannister",e:"⚔️",h:"lannister",a:"Nikolaj Coster-Waldau",d:"The Kingslayer. Broke his sacred oath to save half a million people from wildfire, then spent his life paying for it. His redemption arc — from arrogant knight to humbled man — is one of the series' finest achievements. Lost his hand, found his honor.",bvs:"Book-Jaime explicitly rejects Cersei, burning her letter begging for help. The show controversially returns him to Cersei in the finale, undercutting years of redemption for many fans.",f:["Nikolaj Coster-Waldau practiced sword fighting left-handed for months after Jaime loses his right hand.","The bath scene with Brienne, where Jaime reveals why he killed the Mad King, is consistently ranked among the show's best scenes."]},
{n:"Tywin Lannister",e:"🦁",h:"lannister",a:"Charles Dance",d:"The most powerful man in Westeros who wasn't a king. Cold, ruthless, brilliant — Tywin built the Lannister dynasty through fear and gold. His contempt for Tyrion is his fatal flaw, and his death on the privy is the most undignified end for the most dignified man.",bvs:"Book and show Tywin are very similar — Charles Dance's portrayal is widely considered one of the most faithful castings in the series.",f:["Charles Dance skinned a real stag in his first scene — establishing Tywin as a man who does his own dirty work.","Dance was so beloved that fans petitioned for him to narrate the audiobooks."]},

// ═══ HOUSE TARGARYEN ═══
{n:"Daenerys Targaryen",e:"🐉",h:"targaryen",a:"Emilia Clarke",d:"The Mother of Dragons. Exiled princess who rises from nothing to conquer cities, free slaves, and hatch the first dragons in a century. Her descent from liberator to tyrant in Season 8 is the series' most debated arc.",bvs:"Book-Daenerys is 13 at the start (aged up to ~17 on the show). Her inner monologue shows more political complexity. The 'Mad Queen' turn is foreshadowed more gradually in the books.",f:["Emilia Clarke suffered two brain aneurysms during filming, nearly dying after Seasons 1 and 3 — she told no one on set.","The original pilot cast Tamzin Merchant as Daenerys before the role was recast with Clarke."]},
{n:"Viserys Targaryen",e:"👑",h:"targaryen",a:"Harry Lloyd",d:"Daenerys's abusive older brother who sold her to Khal Drogo for an army. His 'golden crown' death — molten gold poured on his head — is the show's first truly shocking moment. A pathetic villain who genuinely believed he deserved the throne.",bvs:"Very similar in both versions. Book-Viserys is slightly more sympathetic — you see glimpses of the traumatized child he once was before exile warped him.",f:["Harry Lloyd was so good that his brief performance set the template for how Targaryens would be portrayed in all future media.","Viserys's death was the first time the show showed it would kill named characters in unexpected ways."]},
{n:"Rhaegar Targaryen",e:"🎵",h:"targaryen",a:"Wilf Scolding",d:"The prince who started a war. Rhaegar either kidnapped or eloped with Lyanna Stark, triggering Robert's Rebellion. A skilled warrior, harpist, and tragic figure whose obsession with prophecy destroyed the Targaryen dynasty — but produced Jon Snow.",bvs:"Book-Rhaegar is far more developed through memories and accounts. He's painted as a melancholic, scholarly prince obsessed with the Prince That Was Promised prophecy. The show barely features him.",f:["Rhaegar appears in only one brief flashback in the entire show but is mentioned in almost every season.","Martin has said Rhaegar is one of the most important characters in the entire series despite being dead before page one."]},

// ═══ HOUSE BARATHEON ═══
{n:"Robert Baratheon",e:"🦌",h:"baratheon",a:"Mark Addy",d:"The king who won the throne through rebellion and lost it through wine and apathy. Robert was a great warrior and a terrible ruler — his death in a boar hunt (engineered by Cersei) sets the entire series in motion.",bvs:"Very similar. Book-Robert is described as massively fat by the start, which the show achieves with padding. Both versions make clear he was once a formidable warrior.",f:["Mark Addy's scene on the Kingsroad with Cersei — 'Was it ever possible for us?' — was largely improvised and became a defining character moment.","Robert's Rebellion was originally going to be the main story before Martin decided to start 17 years later."]},
{n:"Stannis Baratheon",e:"🔥",h:"baratheon",a:"Stephen Dillane",d:"The rightful king nobody wanted. Stannis is justice without mercy — rigid, humorless, and absolutely correct about his claim to the throne. His relationship with Melisandre and the burning of Shireen define his tragic downfall.",bvs:"Book-Stannis is far more complex — a tragic, sympathetic figure fighting impossible odds. His march on Winterfell is still ongoing in the books. The show reduces and darkens him significantly.",f:["Stephen Dillane has said he never understood the show or why people liked it, despite being excellent in the role.","The 'fewer' grammar correction became Stannis's most beloved character trait despite appearing only twice."]},
{n:"Renly Baratheon",e:"🌈",h:"baratheon",a:"Gethin Anthony",d:"The charming Baratheon who wanted to be king because people liked him, not because he had the best claim. His relationship with Loras Tyrell was one of the show's earliest LGBTQ+ storylines. Killed by shadow magic before he could prove himself.",bvs:"Book-Renly is more political — his claim is based on the argument that the best man should rule, not just the next in line. His relationship with Loras is more subtly handled in the books.",f:["Renly's death by shadow baby remains one of the show's most bizarre and memorable moments.","Gethin Anthony and Finn Jones (Loras) lobbied for their relationship to be shown more explicitly on screen."]},

// ═══ HOUSE GREYJOY ═══
{n:"Theon Greyjoy",e:"⚓",h:"greyjoy",a:"Alfie Allen",d:"The most tortured character in Westeros. Torn between Stark and Greyjoy identity, Theon betrays the family that raised him, is captured and broken by Ramsay Bolton into 'Reek,' and slowly rebuilds himself into someone worthy of sacrifice.",bvs:"Very similar, though book-Theon's Reek chapters are even more psychologically harrowing. His redemption arc is still incomplete in the books.",f:["Alfie Allen is Lily Allen's brother — she wrote the song 'Alfie' about him being lazy, before his career took off.","Allen's performance as Reek was so convincing that fans sent him supportive messages, worried about his mental health."]},
{n:"Euron Greyjoy",e:"🦑",h:"greyjoy",a:"Pilou Asbæk",d:"The show's version: a cocky pirate with a leather jacket and swagger. The book's version: a terrifying Lovecraftian pirate king with Valyrian steel armor, a dragonbinding horn, and possible dark magic. The biggest divergence between book and show.",bvs:"Book-Euron is arguably the most terrifying villain in the series — tied to eldritch horror, blood sacrifice, and apocalyptic ambition. Show-Euron is a charismatic but shallow antagonist.",f:["Pilou Asbæk described his character as 'a rock star in a medieval world.'","Book readers were so disappointed by show-Euron that 'Book Euron vs Show Euron' became shorthand for adaptation failures."]},

// ═══ HOUSE TYRELL ═══
{n:"Margaery Tyrell",e:"🌹",h:"tyrell",a:"Natalie Dormer",d:"The queen who played the game perfectly — manipulating Joffrey, charming Tommen, winning the common people — until Cersei flipped the board by blowing up the Sept. Margaery understood that true power comes from being loved.",bvs:"Book-Margaery is more ambiguous — it's unclear how much is genuine kindness vs. political calculation. The show makes her more clearly a skilled player.",f:["Natalie Dormer's signature smirk became so iconic that it was written into the character's mannerisms.","Margaery is one of the few characters who genuinely outmaneuvers Cersei — which is why Cersei resorts to wildfire."]},
{n:"Olenna Tyrell",e:"🌹",h:"tyrell",a:"Diana Rigg",d:"The Queen of Thorns. The sharpest tongue in Westeros — a grandmother who murdered a king, outwitted Lannisters, and delivered some of the show's best one-liners. Her final scene, revealing she poisoned Joffrey, is legendary.",bvs:"Very similar — Olenna is a scene-stealer in both versions. The show expanded her role significantly because Diana Rigg was so brilliant.",f:["Diana Rigg was a former Bond Girl (On Her Majesty's Secret Service) and Avengers star, bringing decades of gravitas to the role.","'Tell Cersei. I want her to know it was me.' is consistently voted one of the greatest TV lines ever delivered."]},

// ═══ HOUSE MARTELL ═══
{n:"Oberyn Martell",e:"☀️",h:"martell",a:"Pedro Pascal",d:"The Red Viper of Dorne. A warrior-prince driven by vengeance for his sister Elia, murdered by the Mountain. His trial by combat against the Mountain is the show's most visceral fight scene — and its most horrifying death.",bvs:"Very similar in both versions. Book-Oberyn has slightly more political depth and connections to a larger Dornish conspiracy (cut from the show).",f:["Pedro Pascal went on to become one of the biggest actors in the world (The Mandalorian, The Last of Us) — largely thanks to GoT's exposure.","Oberyn's death scene required multiple takes because Pascal kept making the crew laugh between shots."]},
{n:"Ellaria Sand",e:"🐍",h:"martell",a:"Indira Varma",d:"Oberyn's paramour who goes mad with grief after his death, launching a revenge campaign that kills Myrcella Baratheon and destroys House Martell. Her show arc is widely criticized as a waste of Dorne's potential.",bvs:"Book-Ellaria actually argues AGAINST revenge — she's the voice of peace in Dorne. The show inverts her character completely, having her murder innocents instead.",f:["Indira Varma has spoken publicly about how the Sand Snakes storyline was the weakest part of the show.","The Dorne plotline is almost universally considered the show's biggest creative misstep."]},

// ═══ NIGHT'S WATCH / WILDLINGS ═══
{n:"Samwell Tarly",e:"📚",h:"nw",a:"John Bradley",d:"The cowardly boy who became the bravest man on the Wall. Sam kills a White Walker, cures greyscale, discovers Jon's parentage, and ends up Grand Maester. Proof that the pen is mightier than the sword — eventually.",bvs:"Very similar. Book-Sam's journey through Oldtown is more detailed and involves more political intrigue at the Citadel.",f:["John Bradley and Kit Harington's real-life friendship mirrors Jon and Sam's bond — they are best friends off-screen.","Sam is widely considered Martin's self-insert character — the bookish, overweight outsider who becomes essential."]},
{n:"Ygritte",e:"❄️",h:"nw",a:"Rose Leslie",d:"The wildling woman who taught Jon Snow that the world beyond the Wall has its own beauty and its own rules. 'You know nothing, Jon Snow' became the series' most iconic catchphrase. Her death in Jon's arms during the Battle of Castle Black is devastating.",bvs:"Very similar. Book-Ygritte is described as not conventionally attractive — 'gap-toothed and pug-nosed' — which the show ignores by casting Rose Leslie.",f:["Rose Leslie and Kit Harington fell in love on set and married in 2018 — one of the show's great real-life romances.","'You know nothing, Jon Snow' appears only 5 times in the entire book series."]},
{n:"Tormund Giantsbane",e:"🧔",h:"nw",a:"Kristofer Hivju",d:"The wildling warrior famous for his booming laugh, outrageous stories, and unrequited love for Brienne of Tarth. Tormund represents everything the Night's Watch fears about wildlings — and everything they should admire.",bvs:"Book-Tormund is older and more of a leader figure. The show made him younger and more comedic, leaning into Hivju's natural charisma.",f:["Tormund's obsession with Brienne was mostly improvised by Kristofer Hivju and became a fan-favorite running joke.","Hivju tested positive for COVID during the pandemic, making international news partly because of his GoT fame."]},

// ═══ ANTAGONISTS ═══
{n:"The Night King",e:"🥶",h:"villains",a:"Vladimir Furdik",d:"The existential threat. Created by the Children of the Forest as a weapon against men, the Night King became an unstoppable force of death. His army represents the ultimate enemy — one that doesn't care about your politics.",bvs:"The Night King as a specific character doesn't exist in the books. The books have the Others but no single leader. He was created for the show to personify the threat.",f:["Vladimir Furdik was originally the stunt coordinator who played the White Walker that fights Jon at Hardhome, then was promoted to the Night King.","The Night King's death by Arya in a single episode remains the show's most divisive creative decision."]},
{n:"Ramsay Bolton",e:"🔪",h:"villains",a:"Iwan Rheon",d:"The most purely evil character in the series — a sadist who tortures for pleasure, hunts women with dogs, and flays men alive. Ramsay makes Joffrey look like a nuisance. His defeat by Jon and execution by Sansa are cathartic.",bvs:"Very similar, though book-Ramsay is even worse (which is saying something). He marries Jeyne Poole (disguised as Arya) in the books, not Sansa.",f:["Iwan Rheon originally auditioned for Jon Snow — imagine that alternate timeline.","Rheon was so good at being evil that he received death threats from fans who couldn't separate actor from character."]},
{n:"Joffrey Baratheon",e:"💀",h:"villains",a:"Jack Gleeson",d:"The boy king everyone loved to hate. Cruel, cowardly, and stupid — Joffrey is the worst possible person to sit the Iron Throne. His poisoning at the Purple Wedding is the show's most satisfying death.",bvs:"Very similar. Book-Joffrey is slightly younger and even more petulant. Both versions are masterfully hateable.",f:["Jack Gleeson retired from acting after GoT, citing exhaustion — he was only 21 when the show ended.","Gleeson is reportedly one of the nicest people in the cast; co-stars called him 'the sweetest guy who plays the worst character.'"]},
{n:"Walder Frey",e:"🏰",h:"villains",a:"David Bradley",d:"The Lord of the Crossing who violated sacred guest right to massacre the Starks at the Red Wedding. Old, petty, and craven — Walder Frey represents the worst of feudal politics. Arya's revenge, feeding him his sons in a pie, is poetic justice.",bvs:"Very similar. Book-Walder is even more grotesque — described as ancient, drooling, and surrounded by dozens of squabbling heirs.",f:["David Bradley played Argus Filch in Harry Potter — making him one of the few actors to play iconic villains in two mega-franchises.","The Red Wedding was the scene that most shocked the cast when they first read the scripts."]},

// ═══ POWER PLAYERS ═══
{n:"Petyr 'Littlefinger' Baelish",e:"🕸️",h:"other",a:"Aidan Gillen",d:"Chaos is a ladder. The master manipulator who engineered the War of the Five Kings, all because he was rejected by Catelyn Stark decades earlier. The most dangerous weapon in Westeros is a grudge paired with patience.",bvs:"Book-Littlefinger is more subtle — you can't always tell when he's scheming. The show makes his villainy more obvious, partly because we see him from the outside.",f:["Aidan Gillen's accent famously shifted between scenes — fans dubbed it the 'Littlefinger accent teleporter.'","Littlefinger's execution by the Stark siblings was one of the few Season 7 moments that satisfied most fans."]},
{n:"Lord Varys",e:"🕊️",h:"other",a:"Conleth Hill",d:"The Spider. The master of whispers who serves the realm, not the king. A eunuch who built the most powerful intelligence network in the world through 'little birds' — street children who report everything. His true loyalty is always ambiguous.",bvs:"Book-Varys has a much larger endgame — he's secretly supporting Young Griff/Aegon (cut from the show). His motivations are more complex and his intelligence network more formidable.",f:["Conleth Hill reportedly threw his script across the table at the Season 8 read-through when he learned Varys dies.","Hill wore a bald cap for all eight seasons — his real hair is a full head of curls."]},
{n:"Melisandre",e:"🔮",h:"other",a:"Carice van Houten",d:"The Red Priestess. An ancient witch who serves the Lord of Light with fire, shadow babies, blood magic, and unwavering faith. She resurrects Jon Snow, burns Shireen, and walks into the snow to die after the Battle of Winterfell.",bvs:"Very similar. Book-Melisandre has a POV chapter in ADWD that reveals she genuinely believes her visions but frequently misinterprets them — adding tragic dimension.",f:["Carice van Houten was actually cold during the nude scenes — the 'magical warmth' Melisandre supposedly radiates was acting.","The reveal that Melisandre is actually centuries old (removing her necklace) was one of the show's most effective twists."]},
{n:"Sandor 'The Hound' Clegane",e:"🐶",h:"other",a:"Rory McCann",d:"A killer who hates killers. The Hound's journey from Joffrey's attack dog to Arya's reluctant protector is one of the show's most human arcs. His hatred of his brother and his fear of fire define him. Cleganebowl finally happened.",bvs:"In the books, the Hound is presumed dead — a gravedigger on the Quiet Isle who may have found peace. The show resurrects him for more adventures and the fan-demanded Cleganebowl.",f:["Rory McCann was homeless and living in a tent before being cast as the Hound — GoT literally changed his life.","'Every chicken in this room' became one of the show's most beloved comedic moments."]},
{n:"Gregor 'The Mountain' Clegane",e:"⛰️",h:"other",a:"Multiple (Hafþór Björnsson final)",d:"The largest, most terrifying knight in Westeros. A monster even before Qyburn turns him into an undead killing machine. The Mountain's fight with Oberyn — crushing his skull — is the show's most visceral scene.",bvs:"Similar, though the Mountain was recast three times in the show. Book-Mountain is more explicitly a serial rapist and mass murderer.",f:["Hafþór Björnsson, who played the Mountain from Season 4 onward, was the World's Strongest Man in 2018.","Three different actors played the Mountain across eight seasons — the most recasts for any character."]},

// ═══ KNIGHTS & WARRIORS ═══
{n:"Brienne of Tarth",e:"🗡️",h:"other",a:"Gwendoline Christie",d:"The truest knight in Westeros who happens to be a woman. Mocked for her appearance, she proves her worth through unwavering loyalty and skill. Her knighting by Jaime is among the show's most emotional moments ever filmed.",bvs:"Very similar. Book-Brienne has more encounters with the Brotherhood Without Banners and Lady Stoneheart that the show cuts entirely.",f:["Gwendoline Christie submitted herself for an Emmy when HBO didn't — and earned the nomination.","The knighting scene was so emotional that multiple cast members cried during filming, including Nikolaj Coster-Waldau."]},
{n:"Ser Jorah Mormont",e:"🐻",h:"other",a:"Iain Glen",d:"The knight who loved his queen and could never have her. Jorah's devotion to Daenerys spans the entire series — from spy to advisor to the man who dies protecting her at Winterfell. Unrequited love at its most noble.",bvs:"Book-Jorah is less sympathetic — older, less attractive, and more explicitly lustful toward Daenerys. The show softened him considerably through Iain Glen's charisma.",f:["Iain Glen was so popular with fans that the term 'Ser Friendzone' became one of the show's most enduring memes.","Jorah's greyscale cure by Sam was show-only — in the books, the disease is considered incurable."]},
{n:"Ser Bronn of the Blackwater",e:"💰",h:"other",a:"Jerome Flynn",d:"The sellsword with a heart of... well, gold. Bronn fights for whoever pays the most, but his genuine friendship with Tyrion and later Jaime suggests there's more to him than greed. He ends up Lord of Highgarden — the ultimate payoff.",bvs:"Book-Bronn is more of a minor character who drifts away after Tyrion's trial. The show expanded his role enormously because Jerome Flynn was so popular.",f:["Jerome Flynn and Lena Headey (Cersei) reportedly dated and had such a bad breakup that a contractual clause kept them from sharing scenes.","Flynn was half of the 1990s pop duo Robson & Jerome before becoming an actor."]},
{n:"Ser Davos Seaworth",e:"⛵",h:"other",a:"Liam Cunningham",d:"The Onion Knight. A former smuggler who became the most loyal advisor in the series. Davos is the moral conscience of Stannis's court, then Jon's. His grief over Shireen's death is one of the most powerful performances in the show.",bvs:"Very similar. Book-Davos has a more developed backstory with his lost sons at the Blackwater and a separate mission to White Harbor that the show cuts.",f:["Liam Cunningham keeps his lucky onion-shaped cufflinks from the show — a gift from the prop department.","Cunningham's scene discovering Shireen's burnt remains was so intense that the crew stopped filming to comfort him, thinking he was genuinely distressed."]}
,
// ═══ ADDITIONAL STARK ALLIES ═══
{n:"Hodor",e:"🚪",h:"stark",a:"Kristian Nairn",d:"The gentle giant whose only word was his name — until we learned it was a time-loop prophecy: 'Hold the Door.' Hodor carried Bran across Westeros and died protecting him, creating one of the show's most devastating reveals.",bvs:"Both versions reveal 'Hold the Door' but the mechanism differs. Martin confirmed this twist came from him. Book-Hodor is described as simple-minded but sweet.",f:["Kristian Nairn is a professional DJ — he toured clubs as 'DJ Hodor' during the show's run.","'Hold the Door' was one of three major plot points Martin told the showrunners in advance."]},
{n:"Osha",e:"🐺",h:"stark",a:"Natalia Tena",d:"The wildling woman who protects Rickon after the fall of Winterfell. Practical, fierce, and loyal — she represents the kind of person the Starks inspire devotion from. Killed by Ramsay in the show.",bvs:"Book-Osha takes Rickon to the cannibal island of Skagos and may play a much larger role. The show kills her off quickly in Season 6.",f:["Natalia Tena also played Tonks in the Harry Potter films — one of several actors shared between the franchises.","Martin was so impressed by Tena's performance that he expanded Osha's role in the books."]},
{n:"Meera Reed",e:"🐸",h:"stark",a:"Ellie Kendrick",d:"Bran's protector and companion beyond the Wall. Meera dragged Bran through snow, fought wights, and watched her brother die — then was dismissed with barely a thank-you. One of the show's most underserved characters.",bvs:"Book-Meera is more developed and her father Howland Reed (who was at the Tower of Joy) is expected to play a major role in the remaining books.",f:["Ellie Kendrick publicly expressed disappointment with how Meera's story ended in the show.","Howland Reed is the only living witness to the Tower of Joy — a massive Chekhov's gun the show never fully fired."]},
{n:"Lyanna Mormont",e:"🐻",h:"stark",a:"Bella Ramsey",d:"The tiny, fierce Lady of Bear Island who shamed grown men into action with her speeches. Originally a one-scene character, she became a fan favorite and was given a heroic death killing a wight giant at Winterfell.",bvs:"Show-only expansion. Book-Lyanna appears only in a famous letter: 'Bear Island knows no king but the King in the North, whose name is Stark.' The show built an entire character from that line.",f:["Bella Ramsey was 12 during her first appearance and went on to star as Ellie in The Last of Us.","Lyanna was originally supposed to appear in only one episode but was brought back due to overwhelming fan response."]},
{n:"Benjen Stark",e:"🐺",h:"stark",a:"Joseph Mawle",d:"Ned's brother, First Ranger of the Night's Watch, who disappears beyond the Wall and returns as a half-dead, half-alive figure who saves both Bran and Jon at critical moments.",bvs:"Book-Benjen disappears and his fate is unknown. The show merges him with the book character Coldhands — a mysterious undead figure who helps Bran.",f:["Joseph Mawle went on to play the villain Adar in Rings of Power — another fantasy franchise.","Whether Coldhands IS Benjen in the books remains one of the biggest unanswered questions."]},

// ═══ ADDITIONAL LANNISTERS & COURT ═══
{n:"Tommen Baratheon",e:"👑",h:"lannister",a:"Dean-Charles Chapman",d:"The sweet boy king who never wanted power. Manipulated by Cersei, Margaery, and the High Sparrow, Tommen's suicide after the Sept explosion is heartbreaking — he simply steps out of a window when he realizes his mother destroyed everything.",bvs:"Book-Tommen is much younger (8 years old) and more innocent. He loves his kittens (Ser Pounce!) and has no real agency. The show ages him up for the Margaery marriage.",f:["Dean-Charles Chapman previously played a different character (a Lannister cousin killed by Karstark) before being recast as Tommen.","The shot of Tommen silently removing his crown and stepping out the window was done in a single take with no music — devastating."]},
{n:"Myrcella Baratheon",e:"🌺",h:"lannister",a:"Nell Tiger Free",d:"The kindest of Cersei's children, sent to Dorne as a political hostage. Her poisoning by Ellaria Sand is one of the show's quietest tragedies — she dies in Jaime's arms moments after he tells her he's her father.",bvs:"Book-Myrcella is disfigured but alive in Dorne, involved in a much more complex political plot. The show simplifies and kills her.",f:["Nell Tiger Free went on to star in the Apple TV+ thriller Servant.","Myrcella's death fulfills Cersei's prophecy from Maggy the Frog — 'Gold shall be their crowns and gold their shrouds.'"]},
{n:"Kevan Lannister",e:"🦁",h:"lannister",a:"Ian Gelder",d:"Tywin's competent, loyal brother who steps in to stabilize the realm after Tywin's death. In the books, he's assassinated by Varys specifically because he's too effective — Varys needs chaos, not competent leadership.",bvs:"Book-Kevan's assassination by Varys is one of ADWD's most shocking epilogues. The show kills him in the Sept explosion instead, robbing the scene of its political significance.",f:["Kevan's book death reveals Varys's entire endgame — he's supporting Young Griff/Aegon, a plotline cut from the show.","Ian Gelder played the role across all seasons with minimal screen time but maximum dignity."]},
{n:"The High Sparrow",e:"⚡",h:"other",a:"Jonathan Pryce",d:"The humble holy man who became the most dangerous person in King's Landing. By weaponizing faith and poverty against the aristocracy, the High Sparrow brought the Crown to its knees — until Cersei brought wildfire to his.",bvs:"Similar in both versions. Book-High Sparrow's arc is still unresolved — he's alive and in power. The show's wildfire solution is original.",f:["Jonathan Pryce brought Shakespearean gravitas to the role — his quiet menace is more threatening than any army.","The Faith Militant arc parallels real-world religious fundamentalism and class warfare."]},
{n:"Qyburn",e:"🧪",h:"other",a:"Anton Lesser",d:"The disgraced maester who becomes Cersei's most dangerous ally. He creates the Mountain's undead form, runs Cersei's spy network, and orchestrates the wildfire plot. Science without ethics personified.",bvs:"Similar in both. Book-Qyburn is slightly more explicitly horrifying — his experiments on living prisoners are described in more detail.",f:["Anton Lesser's quiet, gentle delivery makes Qyburn one of the creepiest characters precisely because he seems so reasonable.","Qyburn replacing Varys as Master of Whisperers is a perfect illustration of how Cersei trades competence for loyalty."]},
{n:"Grand Maester Pycelle",e:"🧓",h:"other",a:"Julian Glover",d:"The ancient, doddering maester who is actually a shrewd political survivor. Pycelle has served (and betrayed) multiple kings, always siding with whoever holds power — specifically the Lannisters.",bvs:"Very similar. Book-Pycelle is killed by Varys in the ADWD epilogue. The show has him murdered by Qyburn's little birds.",f:["Julian Glover previously played a Bond villain in For Your Eyes Only and an Indiana Jones villain in The Last Crusade.","There's a deleted scene showing Pycelle dropping his feeble act and doing pushups — confirming his decrepitude is performative."]},

// ═══ ADDITIONAL TARGARYEN / ESSOS ═══
{n:"Khal Drogo",e:"🐴",h:"targaryen",a:"Jason Momoa",d:"The mighty Dothraki warlord who marries Daenerys. What begins as a forced marriage becomes genuine love — his death from an infected wound (and Mirri Maz Duur's treachery) launches Daenerys on her path to power and dragons.",bvs:"Very similar. Book-Drogo's relationship with Daenerys starts more violently but evolves similarly. His death is the catalyst for her transformation in both versions.",f:["Jason Momoa was relatively unknown before GoT — the role launched him to Aquaman and global stardom.","Momoa did the Haka dance at his audition, which reportedly stunned the casting directors."]},
{n:"Missandei",e:"🦋",h:"targaryen",a:"Nathalie Emmanuel",d:"The freed slave who becomes Daenerys's most trusted advisor and closest friend. Brilliant, multilingual, and dignified — her execution by the Mountain in Season 8 is one of the show's most controversial moments.",bvs:"Book-Missandei is a child (about 10 years old). The show ages her up significantly for the Grey Worm romance. Her execution is show-only.",f:["Nathalie Emmanuel went on to join the Fast & Furious franchise as Ramsey.","Missandei's death being the trigger for Daenerys's destruction of King's Landing was criticized as making a Black woman's death serve a white character's arc."]},
{n:"Grey Worm",e:"🗡️",h:"targaryen",a:"Jacob Anderson",d:"Commander of the Unsullied, the most disciplined army in the world. His love story with Missandei — two freed slaves finding humanity together — is one of the show's most tender subplots.",bvs:"Book-Grey Worm is a more minor character. The entire romance with Missandei is show-invented since book-Missandei is a child.",f:["Jacob Anderson is also a musician who performs under the name Raleigh Ritchie.","The Unsullied's training is based on historical Spartan and Janissary military traditions."]},
{n:"Daario Naharis",e:"⚔️",h:"targaryen",a:"Michiel Huisman (S4-6)",d:"The charming sellsword who becomes Daenerys's lover and commander of the Second Sons. Handsome, cocky, and surprisingly loyal — left behind in Meereen when Daenerys sails for Westeros.",bvs:"Book-Daario has blue hair, a gold mustache, and a three-pronged beard — far more flamboyant than the show version. He's also more morally ambiguous.",f:["Daario was recast between Seasons 3 and 4 — Ed Skrein played him first, then Michiel Huisman took over. The change was so jarring fans joked about it.","Book readers were disappointed the show toned down Daario's outrageous appearance."]},
{n:"Jaqen H'ghar",e:"🎭",h:"other",a:"Tom Wlaschiha",d:"The mysterious Faceless Man who introduces Arya to the concept of becoming 'No One.' His gift of three deaths to Arya and later her training in Braavos are among the show's most intriguing mystical elements.",bvs:"Book-Jaqen appears briefly in ACOK and may reappear in disguise at the Citadel in AFFC. The show expands his role as Arya's primary trainer.",f:["Tom Wlaschiha's delivery of 'A man has no name' made it one of the show's most quotable lines.","The Faceless Men's temple in Braavos (the House of Black and White) was filmed in Dubrovnik, Croatia."]},
{n:"Mirri Maz Duur",e:"🔮",h:"other",a:"Mia Soteriou",d:"The Lhazareen healer who betrays Drogo and Daenerys. From her perspective, she's avenging her people — Drogo's warriors raped and enslaved her village. She's a villain or a hero depending on whose side you're on.",bvs:"Very similar in both. Her prophecy about Drogo's return ('When the sun rises in the west...') may have deeper meaning in the books.",f:["Mirri is one of the show's earliest examples of moral complexity — the 'villain' has a completely justified grievance.","Her blood magic sacrifice is what enables Daenerys's dragon eggs to hatch — making her inadvertently the mother of dragons' midwife."]},

// ═══ ADDITIONAL NIGHT'S WATCH / WALL ═══
{n:"Jeor Mormont",e:"🐻",h:"nw",a:"James Cosmo",d:"The Lord Commander of the Night's Watch and Jorah's father. Gruff, wise, and commanding — he leads the Great Ranging beyond the Wall and is murdered by his own men at Craster's Keep.",bvs:"Very similar. Book-Jeor gives Jon the Valyrian steel sword Longclaw, establishing the Mormont connection that pays off with Lyanna Mormont.",f:["James Cosmo also played the father figure in Braveheart — he specializes in grizzled paternal authority.","Longclaw's pommel was changed from a bear to a wolf when Jeor gave it to Jon — a detail both versions include."]},
{n:"Maester Aemon",e:"📚",h:"nw",a:"Peter Vaughan",d:"The blind, ancient maester of the Night's Watch — secretly Aemon Targaryen, who refused the throne decades before the story begins. His wisdom guides Jon Snow, and his death of old age is one of the show's most peaceful exits.",bvs:"Very similar. Book-Aemon has more scenes and his identity as a Targaryen carries more weight. He dies aboard a ship to Oldtown in the books.",f:["Peter Vaughan was legally blind himself during filming, which added authenticity to the role.","Aemon's line 'Kill the boy, and let the man be born' is one of Jon's most important pieces of advice."]},
{n:"Alliser Thorne",e:"⚔️",h:"nw",a:"Owen Teale",d:"The bitter, antagonistic master-at-arms of the Night's Watch who despises Jon Snow. He leads the mutiny that kills Jon — but his hatred comes from a genuine belief that Jon is destroying the Watch by letting wildlings through.",bvs:"Very similar. Book-Thorne is sent to King's Landing with a wight's hand as proof and is humiliated by Tyrion. Both versions kill Jon.",f:["Owen Teale played Thorne as someone who genuinely believes he's right — making the mutiny more tragic than villainous.","Thorne was a Targaryen loyalist forced to take the black after Robert's Rebellion — his bitterness has decades of backstory."]},
{n:"Mance Rayder",e:"👑",h:"nw",a:"Ciarán Hinds",d:"The King-Beyond-the-Wall. A former Night's Watch ranger who united the wildling clans not for conquest but for survival — to flee the White Walkers. Burned alive by Stannis and Melisandre.",bvs:"In the books, Mance survives through a glamour spell by Melisandre and is sent on a secret mission to Winterfell. The show kills him definitively.",f:["Ciarán Hinds also played Julius Caesar in Rome — another HBO epic about politics and power.","Mance's ability to unite dozens of warring wildling clans is arguably a greater political achievement than anything the southern kings accomplish."]},
{n:"Craster",e:"💀",h:"villains",a:"Robert Pugh",d:"The vile wildling who marries his own daughters and sacrifices his sons to the White Walkers. His keep is a horror, and his death at the hands of mutinous Night's Watch men triggers a chain of events leading to Jon's murder.",bvs:"Very similar. Both versions imply his sons become White Walkers. One of the show's most unambiguously evil characters.",f:["Craster's Keep scenes were so disturbing they required content warnings when the show aired.","The revelation that Craster's sons become White Walkers is one of the show's most chilling lore reveals."]},
{n:"Gilly",e:"🌼",h:"nw",a:"Hannah Murray",d:"Craster's daughter-wife who escapes with Sam and becomes his partner. From the most horrific background imaginable, she builds a life of dignity and love. Her discovery of Rhaegar's annulment record is a key plot point.",bvs:"Very similar. Book-Gilly's baby is secretly swapped with Mance's baby by Jon — a plot point the show skips entirely.",f:["Hannah Murray was previously known for playing Cassie in the UK series Skins.","Gilly finding the annulment record in the Citadel is played for comedy but is actually the most important document in the series."]},

// ═══ ADDITIONAL VILLAINS & ANTAGONISTS ═══
{n:"Roose Bolton",e:"🔪",h:"villains",a:"Michael McElhatton",d:"The Leech Lord. Cold, calculating, and terrifyingly quiet — Roose is the man who actually murders Robb Stark at the Red Wedding. His whispered voice and dead eyes make him one of the series' most unsettling presences.",bvs:"Very similar. Book-Roose is even more explicitly sinister — he uses leeches as a health practice and his pale eyes are constantly noted.",f:["Michael McElhatton's whisper-quiet delivery was a deliberate choice to contrast with the loud chaos around him.","Roose's line 'The Lannisters send their regards' (changed from 'Jaime Lannister sends his regards' in the books) is the Red Wedding's killing blow."]},
{n:"Tyene/Obara/Nymeria Sand",e:"🐍",h:"villains",a:"Various",d:"The Sand Snakes — Oberyn's bastard daughters who seek revenge for his death. Their show portrayal is widely criticized as the adaptation's weakest element, reducing complex book characters to one-dimensional warriors.",bvs:"Book Sand Snakes are distinct, politically savvy characters with different personalities and schemes. The show turns them into near-identical action figures with bad dialogue.",f:["'You want a good girl, but you need the bad pussy' is frequently cited as the single worst line in the entire series.","The Dorne storyline's failure is often cited as the moment the show began losing its careful approach to adaptation."]},
{n:"Karl Tanner",e:"🗡️",h:"villains",a:"Burn Gorman",d:"The mutineer who kills Lord Commander Mormont and takes over Craster's Keep. A vicious criminal from Flea Bottom, Karl represents the worst of what the Night's Watch attracts.",bvs:"Show-expanded character. Karl's mutiny at Craster's Keep and his fight with Jon are largely show-original additions.",f:["Burn Gorman's scenery-chewing performance as 'a fookin' legend of Gin Alley' became a beloved meme.","Karl Tanner is one of the show's best examples of a minor villain elevated by a great actor."]},

// ═══ ADDITIONAL RIVERLANDS / REACH ═══
{n:"Edmure Tully",e:"🐟",h:"other",a:"Tobias Menzies",d:"Catelyn's hapless brother who can't shoot an arrow straight, surrenders Riverrun, and somehow ends up on the small council that chooses Bran as king. The series' most enduring punchline.",bvs:"Very similar. Book-Edmure is more sympathetic — he's a decent man in impossible circumstances. The show leans harder into comedy.",f:["Tobias Menzies went on to play Prince Philip in The Crown — a significant upgrade from Edmure.","Edmure's attempt to speak at the choosing of the new king, only to be shushed by Sansa, is one of the finale's few laugh-out-loud moments."]},
{n:"Brynden 'The Blackfish' Tully",e:"🐟",h:"other",a:"Clive Russell",d:"Catelyn and Edmure's uncle, the finest military commander the Tullys ever produced. Escapes the Red Wedding and holds Riverrun against the Lannisters. A stubborn, brilliant old soldier.",bvs:"Book-Blackfish escapes Riverrun by swimming the moat and his fate is unknown. The show kills him off-screen, which frustrated fans.",f:["The Blackfish earned his nickname by being the 'black sheep' of the Tully family — refusing the marriage his brother arranged.","Clive Russell brought such authority to the role that fans wanted an entire spinoff about his Rebellion-era adventures."]},
{n:"Loras Tyrell",e:"🌹",h:"tyrell",a:"Finn Jones",d:"The Knight of Flowers — one of the realm's finest warriors and Renly Baratheon's secret lover. His imprisonment and mutilation by the Faith Militant, and death in the Sept explosion, end the Tyrell male line.",bvs:"Book-Loras is a much more complex warrior — he leads a dangerous siege of Dragonstone. The show reduces him to primarily his sexuality and his relationship with Renly.",f:["Finn Jones went on to play Iron Fist in the Marvel Netflix universe.","Book readers criticized the show for defining Loras entirely by his sexuality rather than his martial prowess."]},
{n:"Randyll Tarly",e:"⚔️",h:"other",a:"James Faulkner",d:"Sam's cruel father who forced him to take the black by threatening to kill him. One of the best military commanders in Westeros but a terrible father. Executed by Daenerys's dragonfire for refusing to bend the knee.",bvs:"Similar. Book-Randyll is more politically prominent — he's a key Tyrell bannerman and one of the few military minds who can match Stannis.",f:["Randyll's execution by dragonfire is one of the early warning signs of Daenerys's willingness to use disproportionate force.","His Valyrian steel sword Heartsbane is stolen by Sam — one of the few lighthearted heist moments in the series."]},

// ═══ IRON ISLANDS ═══
{n:"Yara Greyjoy",e:"⚓",h:"greyjoy",a:"Gemma Whelan",d:"Theon's sister (Asha in the books), a fierce warrior and ship captain who fights for the Salt Throne. Her loyalty to Theon despite his betrayals shows the Greyjoy capacity for honor beneath the raiding.",bvs:"Renamed from Asha to Yara to avoid confusion with Osha. Book-Asha is more politically ambitious and leads her own fleet. The show simplifies her arc.",f:["Gemma Whelan was originally told she was auditioning for a comedy — she had no idea GoT was a drama.","Yara is one of the show's few openly LGBTQ+ characters, though this aspect is barely present in the books."]},
{n:"Balon Greyjoy",e:"🦑",h:"greyjoy",a:"Patrick Malahide",d:"Theon's father and Lord of the Iron Islands. A bitter old man who launched a failed rebellion, rejected his returned son, and was murdered by his brother Euron. Balon's pride destroyed his family.",bvs:"Very similar. Book-Balon's death happens much earlier and is more explicitly linked to Euron's ambition. The show delays it significantly.",f:["Balon is the 'fifth king' of the War of the Five Kings who most people forget about.","Patrick Malahide's performance makes Balon's cruelty to Theon one of the show's most uncomfortable father-son scenes."]},

// ═══ DORNE ═══
{n:"Doran Martell",e:"☀️",h:"martell",a:"Alexander Siddig",d:"The Prince of Dorne who plays the longest game in Westeros. Patient, calculating, and wheelchair-bound — Doran has a secret plan spanning decades. The show kills him off quickly, wasting enormous book potential.",bvs:"Book-Doran is one of the most complex characters — his 'Fire and Blood' speech revealing his alliance with the Targaryens is a masterpiece. The show murders him in his chair, discarding his entire storyline.",f:["Alexander Siddig (from Star Trek: Deep Space Nine) was reportedly furious about how quickly Doran was killed off.","Doran's book arc represents one of the biggest missed opportunities in the entire adaptation."]},

// ═══ ADDITIONAL KEY FIGURES ═══
{n:"Beric Dondarrion",e:"⚡",h:"other",a:"Richard Dormer",d:"The Lightning Lord — a knight killed and resurrected six times by the Lord of Light through Thoros of Myr. Each death takes something from him. He exists to fulfill one purpose: saving Arya at Winterfell.",bvs:"Book-Beric gives his final life to resurrect Catelyn as Lady Stoneheart — a crucial plot point the show removes entirely.",f:["Richard Dormer's flaming sword fight against the Hound is one of the show's most visually spectacular duels.","The show's version of Beric essentially absorbs Lady Stoneheart's narrative purpose."]},
{n:"Thoros of Myr",e:"🔥",h:"other",a:"Paul Kaye",d:"The drunk Red Priest who discovers he can actually resurrect the dead. Thoros never asked for this power — he's a failed priest who became a warrior and accidentally became the most important holy man in Westeros.",bvs:"Very similar. Both versions portray him as a reluctant miracle worker who drinks to cope with the horror of what he does.",f:["Paul Kaye is a famous UK comedian (Dennis Pennis) — his casting as Thoros was surprising but brilliant.","Thoros resurrecting Beric multiple times is the first proof that the Lord of Light's power is real — before Melisandre and Jon."]},
{n:"Podrick Payne",e:"🗡️",h:"other",a:"Daniel Portman",d:"Tyrion's loyal squire who becomes Brienne's squire and eventually a knight. Pod's quiet competence and loyalty make him the unsung hero of several storylines. Also apparently legendary in the bedroom.",bvs:"Very similar. Book-Pod is younger and more timid. The show's brothel joke (where the women return his money) is show-only.",f:["The 'What did Pod do?' mystery about why the sex workers returned his money became one of the show's longest-running jokes.","Daniel Portman's singing voice in 'Jenny of Oldstones' at the Winterfell feast stunned audiences."]},
{n:"Ros",e:"🌹",h:"other",a:"Esmé Bianco",d:"A show-original character — a sex worker from Winterfell who rises through King's Landing's power structure before being murdered by Joffrey. Ros serves as an audience surrogate witnessing the cruelty of the powerful.",bvs:"Entirely show-created. Ros doesn't exist in the books. She was invented to give the audience an everyday person's perspective on King's Landing's politics.",f:["Ros is the show's most prominent original character, appearing in 18 episodes across 3 seasons.","Her death by crossbow at Joffrey's hands was one of the show's most criticized scenes for gratuitous violence."]},
{n:"Tycho Nestoris",e:"💰",h:"other",a:"Mark Gatiss",d:"The representative of the Iron Bank of Braavos — because in Westeros, the banks always win. Tycho demonstrates that financial power trumps military power: whoever the Iron Bank backs usually takes the throne.",bvs:"Book-Tycho is more involved in Northern politics, dealing with Stannis directly. The show simplifies his role to Cersei's financier.",f:["Mark Gatiss (Sherlock co-creator) brought perfect dry menace to the role of a banker more dangerous than any army.","The Iron Bank's motto — 'The Iron Bank will have its due' — is essentially Westeros's version of 'the house always wins.'"]},
{n:"Shireen Baratheon",e:"📖",h:"baratheon",a:"Kerry Ingram",d:"Stannis's sweet, greyscale-scarred daughter who teaches Davos to read and is burned alive by her own father at Melisandre's urging. Her death is the moment Stannis crosses a moral line he can never return from.",bvs:"Book-Shireen is still alive. Martin confirmed she will be burned in the books but likely by a different character in different circumstances. The show's version was widely considered the series' most disturbing scene.",f:["Kerry Ingram's screaming during the burning scene was so convincing that crew members had to leave the set.","Shireen's burning is the scene most commonly cited by former fans as the moment they nearly stopped watching."]},
{n:"Gendry",e:"🔨",h:"baratheon",a:"Joe Dempsie",d:"Robert Baratheon's last surviving bastard — a blacksmith who unknowingly carries royal blood. His rowing meme (disappearing for three seasons) became legendary. Eventually legitimized as Gendry Baratheon, Lord of Storm's End.",bvs:"Book-Gendry stays with the Brotherhood Without Banners. The show gives him Edric Storm's storyline (the Dragonstone blood sacrifice) and a romance with Arya.",f:["Gendry rowing his boat became such a famous meme that the show acknowledged it with a joke when he returned.","Joe Dempsie joked that he spent his off-seasons actually learning to row."]},
{n:"Robin Arryn",e:"🦅",h:"other",a:"Lino Facioli",d:"The spoiled, breastfed Lord of the Vale who grows from a pathetic child into... still a somewhat pathetic young lord, but one who controls the Knights of the Vale. His glow-up in the finale surprised everyone.",bvs:"Book-Robin (called Robert in the books) is even weaker and more pitiful. Littlefinger schemes to remove him from power. The show's finale 'glow-up' is original.",f:["Lino Facioli's transformation from sickly child to handsome young lord in the finale spawned thousands of memes.","Robin Arryn controlling one of Westeros's strongest armies while being one of its weakest characters is peak GoT irony."]},
{n:"Septa Unella",e:"🔔",h:"other",a:"Hannah Waddingham",d:"The Faith Militant septa who torments Cersei during her imprisonment, repeating 'Shame' during the walk of atonement. Her fate at Cersei's hands — left alone with the Mountain — is implied to be horrifying.",bvs:"Similar in both. Show-Unella's extended torture by the Mountain is implied but not shown.",f:["Hannah Waddingham went on to star in Ted Lasso, winning an Emmy — a massive career shift from shame-bell nun.","Waddingham was actually waterboarded during the Cersei torture scene and has spoken about the trauma of filming it."]},
{n:"Syrio Forel",e:"🗡️",h:"other",a:"Miltos Yerolemou",d:"The First Sword of Braavos who teaches Arya to sword fight and (probably) dies defending her from Lannister guards. His fate is never confirmed, leading to endless fan theories that he survived.",bvs:"Identical. Book-Syrio also has an ambiguous death. The theory that he's actually Jaqen H'ghar is popular but unconfirmed.",f:["'What do we say to the God of Death? Not today.' is one of the show's most iconic lines.","Miltos Yerolemou trained Maisie Williams in real sword techniques — she learned left-handed fighting because Arya is left-handed."]},
{n:"Lancel Lannister",e:"🙏",h:"lannister",a:"Eugene Simon",d:"Cersei's cousin whom she seduces to spy on Robert, then to poison him. Lancel later joins the Faith Militant out of guilt, becoming a fanatical zealot — and dies trying to stop Cersei's wildfire plot.",bvs:"Similar trajectory. Book-Lancel's confession to the High Sparrow is what triggers Cersei's arrest. The show streamlines this.",f:["Lancel crawling through the Sept basement trying to reach the wildfire candles is one of the most tense sequences in the finale.","Eugene Simon played the role across 5 seasons, aging from lovestruck boy to hollow-eyed zealot."]},
{n:"Hot Pie",e:"🍞",h:"other",a:"Ben Hawkey",d:"Arya's friend from the road who discovers his true calling: baking. Hot Pie is the show's purest soul — a reminder that normal, kind people exist in this world of monsters and politicians.",bvs:"Very similar. Hot Pie appears more briefly in the books but serves the same narrative purpose — a touch of ordinary humanity in Arya's dark journey.",f:["Ben Hawkey actually opened a real bakery selling direwolf bread after the show.","Hot Pie's survival through the entire series while surrounded by death is statistically more impressive than any battle victory."]},
{n:"Ser Ilyn Payne",e:"⚔️",h:"other",a:"Wilko Johnson",d:"The mute King's Justice who beheads Ned Stark. Silent and terrifying, Ser Ilyn is the embodiment of royal power — he kills whoever the king tells him to, without question or expression.",bvs:"In the books, Jaime uses Ser Ilyn as a secret sword-training partner because Ilyn can't tell anyone about his weakness. The show cuts this.",f:["Wilko Johnson was diagnosed with terminal cancer during filming but survived — he returned to his career as a guitarist for Dr. Feelgood.","Ser Ilyn's tongue was cut out by the Mad King for making a joke about Tywin being the real ruler."]},
{n:"Lysa Arryn",e:"🦅",h:"other",a:"Kate Dickie",d:"Catelyn's unhinged sister, Lady of the Vale, who breastfeeds her son well past infancy and is obsessed with Littlefinger. She poisoned Jon Arryn at Littlefinger's command — the act that starts the entire series.",bvs:"Very similar. Both versions reveal that Lysa, not the Lannisters, poisoned Jon Arryn — reframing every event of the first book/season.",f:["The revelation that Lysa started the entire conflict by poisoning her husband at Littlefinger's behest is the series' most underrated plot twist.","Kate Dickie's performance was so unsettling that she received hate mail from viewers."]},
{n:"Ramsay's Twenty Good Men",e:"🏕️",h:"villains",a:"Various",d:"Not a character but a meme. Ramsay Bolton sends twenty good men to sabotage Stannis's camp in Season 5, destroying supplies and horses. This impossible feat became shorthand for the show's declining realism.",bvs:"The book's Battle of Ice between Stannis and the Boltons hasn't happened yet — and is expected to play out very differently without magical stealth squads.",f:["'Twenty good men' became one of the show's most enduring criticisms — fans use it whenever the show's logic seems questionable.","This moment is often cited as the beginning of the show prioritizing spectacle over the careful politics of earlier seasons."]},
{n:"Olly",e:"💀",h:"nw",a:"Brenock O'Connor",d:"The boy who watches his parents murdered by wildlings, then joins the Night's Watch and becomes Jon Snow's steward. His betrayal — stabbing Jon with the words 'For the Watch' — makes him one of the most hated characters despite being a traumatized child.",bvs:"Olly is entirely show-created. The books have a different set of mutineers who kill Jon, with different motivations.",f:["'Olly did nothing wrong' vs. 'F*** Olly' became one of the fandom's most heated debates.","Brenock O'Connor received so much online hate that the show's actors had to publicly defend him — he was 13 years old."]}
,
{n:"Jojen Reed",e:"🌿",h:"stark",a:"Thomas Brodie-Sangster",d:"Meera's brother who guides Bran north with prophetic green dreams. His visions lead them to the Three-Eyed Raven, but he knows from the start that the journey will cost him his life.",bvs:"Book-Jojen is still alive beyond the Wall. The show kills him with fireballs from skeleton wights — a scene many found tonally jarring.",f:["Thomas Brodie-Sangster was already famous from Love Actually and Maze Runner before GoT.","The 'Jojen paste' theory — that Bran unknowingly eats Jojen in the books — is one of the darkest fan theories."]},
{n:"Talisa Maegyr",e:"💕",h:"stark",a:"Oona Chaplin",d:"Robb Stark's wife in the show — a Volantene healer he falls for on the battlefield. Her pregnancy and murder at the Red Wedding add an extra layer of horror. She replaces book-character Jeyne Westerling.",bvs:"Entirely different character from the books. Book-Robb marries Jeyne Westerling out of honor after sleeping with her. Jeyne survives the Red Wedding (she wasn't there).",f:["Oona Chaplin is Charlie Chaplin's granddaughter.","Talisa's murder — stabbed repeatedly in her pregnant belly — was the Red Wedding's most viscerally shocking moment."]},
{n:"Shae",e:"💔",h:"other",a:"Sibel Kekilli",d:"Tyrion's lover who betrays him at his trial and is found in Tywin's bed. Her death at Tyrion's hands is one of the darkest moments for our most sympathetic character — he strangles the woman he loved.",bvs:"Book-Shae is more clearly a sex worker playing a role. Show-Shae seems to genuinely love Tyrion, making her betrayal and death more tragic.",f:["Sibel Kekilli won the German equivalent of the Oscar twice before joining GoT.","Shae's betrayal at the trial is the final push that sends Tyrion over the edge to kill both her and Tywin."]},
{n:"Ser Barristan Selmy",e:"🗡️",h:"targaryen",a:"Ian McElhinney",d:"The greatest living knight in Westeros, dismissed from the Kingsguard by Joffrey and joining Daenerys's cause. His honor and skill are legendary — he's the series' ideal of what a knight should be.",bvs:"Book-Barristan is still alive and a major POV character ruling Meereen. The show kills him in a street fight in Season 5, which the actor publicly protested.",f:["Ian McElhinney was so upset about his death that he confronted the showrunners, calling it a mistake.","Book-Barristan has a planned battle chapter that will open The Winds of Winter."]},
{n:"Lord Commander Mormont's Raven",e:"🐦",h:"nw",a:"A real raven",d:"The Three-Eyed Raven's agent? Just a bird? The raven that screams 'CORN!' and seemingly guides Jon at critical moments. One of the series' most persistent mysteries.",bvs:"Book-raven is much more prominent and clearly connected to Bloodraven/the Three-Eyed Crow. It speaks more words and seems to have genuine intelligence.",f:["The raven actor was actually multiple ravens trained by a specialist bird handler.","Book fans are convinced the raven is skinchanged by Bloodraven, making every 'Corn!' a message from the old gods."]},
{n:"Wun Wun",e:"🏔️",h:"nw",a:"Ian Whyte",d:"The last giant south of the Wall. Wun Wun fights with the wildlings at Hardhome and the Battle of the Bastards, where he breaks down Winterfell's gates and is killed by Ramsay's arrow.",bvs:"Book-Wun Wun is involved in a different fight at Castle Black and kills Ser Patrek of King's Mountain. His book fate is uncertain.",f:["Wun Wun's name is a reference to Phil Simms, quarterback #11 of the New York Giants — Martin is a football fan.","Ian Whyte also played White Walkers and a giant in multiple seasons, making him the show's most versatile physical performer."]},
{n:"Ser Pounce",e:"🐱",h:"lannister",a:"Three different cats",d:"Tommen's beloved kitten who briefly appeared in Season 4 and was confirmed killed off-screen by Cersei. The fandom's reaction to Ser Pounce's death was disproportionately passionate.",bvs:"Book-Tommen has three cats: Ser Pounce, Lady Whiskers, and Boots. They appear multiple times and are central to Tommen's gentle characterization.",f:["Ser Pounce has his own fan Wiki page with more detail than some human characters.","When the show confirmed Ser Pounce was dead, the internet mourned more vocally than for some major character deaths."]},
{n:"Night's King (Book)",e:"❄️",h:"villains",a:"N/A",d:"Not to be confused with the show's Night King — the book's Night's King was the 13th Lord Commander of the Night's Watch who fell in love with a female White Walker. He's a legendary figure, not a current threat.",bvs:"Completely different from the show's Night King. The book's Night's King is an ancient historical figure, not the leader of the White Walkers. The show created its own character.",f:["Martin has confirmed the show's Night King and the book's Night's King are different characters with different origins.","The book's Night's King may have been a Stark — adding a dark chapter to the family's history."]}
,
{n:"Maester Luwin",e:"⛓️",h:"stark",a:"Donald Sumpter",d:"Winterfell's wise old maester who serves the Stark children loyally until his death during Theon's takeover. His final scene, asking to die in the godswood, is one of the show's quietest heartbreaks.",bvs:"Very similar. Book-Luwin is one of the few adults who genuinely loves the Stark children. His death is equally moving in both versions.",f:["Donald Sumpter brought such gentle authority to Luwin that fans consider him the show's best minor character.","Luwin's last act — telling Osha to split the boys up to protect them — directly saves Bran and Rickon's lives."]},
{n:"Illyrio Mopatis",e:"🏛️",h:"other",a:"Roger Allam",d:"The wealthy Pentoshi magister who shelters Viserys and Daenerys and arranges the Drogo marriage. In the books, he's a key conspirator with Varys, plotting to restore the Targaryens — or someone claiming to be one.",bvs:"Book-Illyrio is much more important — he's secretly backing Young Griff/Aegon with Varys. The show drops him after Season 1, losing a major conspiracy thread.",f:["Roger Allam appeared in only the pilot but his scheming sets the entire Daenerys storyline in motion.","Book-Illyrio's connection to Young Griff is one of ASOIAF's biggest unrevealed conspiracies."]},
{n:"Rhaegal & Viserion",e:"🐉",h:"targaryen",a:"CGI",d:"Daenerys's other two dragons, named for her brothers. Viserion is killed and resurrected by the Night King as an ice dragon. Rhaegal is shot down by Euron's scorpion bolts. Their deaths strip Daenerys of her power and her children.",bvs:"Book dragons are smaller and their fates are unknown. Viserion's conversion to an ice dragon is show-only. Rhaegal's death by scorpion bolt was widely criticized as contrived.",f:["Viserion breathing blue flame to destroy the Wall is one of the show's most iconic visual moments.","Rhaegal's death in Season 8 was criticized because Daenerys somehow didn't see an entire fleet of ships with giant crossbows."]}

];

var HOUSES=[
{id:'all',label:'All',cls:'h-all'},
{id:'stark',label:'🐺 Stark',cls:'h-stark'},
{id:'lannister',label:'🦁 Lannister',cls:'h-lannister'},
{id:'targaryen',label:'🐉 Targaryen',cls:'h-targaryen'},
{id:'baratheon',label:'🦌 Baratheon',cls:'h-baratheon'},
{id:'greyjoy',label:'🦑 Greyjoy',cls:'h-greyjoy'},
{id:'tyrell',label:'🌹 Tyrell',cls:'h-tyrell'},
{id:'martell',label:'☀️ Martell',cls:'h-martell'},
{id:'nw',label:'⚔️ Watch / Wildlings',cls:'h-nw'},
{id:'villains',label:'💀 Antagonists',cls:'h-villains'},
{id:'other',label:'♟️ Other',cls:'h-other'}
];

var activeHouse='all';

(function(){
  var fl=document.getElementById('houseFilters');
  HOUSES.forEach(function(h){
    var b=document.createElement('button');
    b.className='hf-btn '+h.cls+(h.id==='all'?' active':'');
    b.textContent=h.label;
    b.onclick=function(){
      fl.querySelectorAll('.hf-btn').forEach(function(x){x.classList.remove('active')});
      b.classList.add('active');
      activeHouse=h.id;
      renderChars();
    };
    fl.appendChild(b);
  });
  document.getElementById('searchBox').addEventListener('input',renderChars);
  renderChars();
})();

function getBadgeClass(h){
  var map={stark:'badge-stark',lannister:'badge-lannister',targaryen:'badge-targaryen',baratheon:'badge-baratheon',greyjoy:'badge-greyjoy',tyrell:'badge-tyrell',martell:'badge-martell',nw:'badge-nw',villains:'badge-villains',other:'badge-other'};
  return map[h]||'badge-other';
}
function getHouseLabel(h){
  var map={stark:'Stark',lannister:'Lannister',targaryen:'Targaryen',baratheon:'Baratheon',greyjoy:'Greyjoy',tyrell:'Tyrell',martell:'Martell',nw:'Night\'s Watch',villains:'Antagonist',other:'Other'};
  return map[h]||h;
}

function renderChars(){
  var q=document.getElementById('searchBox').value.toLowerCase().trim();
  var grid=document.getElementById('charGrid');
  var html='';
  var count=0;
  C.forEach(function(c){
    if(activeHouse!=='all'&&c.h!==activeHouse) return;
    if(q){
      var hay=(c.n+' '+c.d+' '+c.a+' '+c.h).toLowerCase();
      if(hay.indexOf(q)<0) return;
    }
    count++;
    html+='<div class="cc"><div class="cc-head"><div class="cc-top"><span class="cc-emoji">'+c.e+'</span><span class="cc-name">'+c.n+'</span><span class="cc-badge '+getBadgeClass(c.h)+'">'+getHouseLabel(c.h)+'</span></div><div class="cc-actor">Portrayed by '+c.a+'</div></div><div class="cc-body">';
    html+='<div class="cc-desc">'+c.d+'</div>';
    if(c.bvs){html+='<div class="cc-section"><div class="cc-label">📖 Book vs Show</div><div class="cc-bvs">'+c.bvs+'</div></div>';}
    if(c.f&&c.f.length){
      html+='<div class="cc-section"><div class="cc-label">⚡ Fun Facts</div><ul class="cc-facts">';
      c.f.forEach(function(f){html+='<li>'+f+'</li>'});
      html+='</ul></div>';
    }
    html+='</div></div>';
  });
  if(!html) html='<div class="cc-empty">No characters match your search.</div>';
  grid.innerHTML=html;
  document.getElementById('count').textContent=count+' of '+C.length+' characters';
}
</script>
</body>
</html>
