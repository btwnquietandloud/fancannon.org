function renderPicker(){const app=document.getElementById('app');let grid=STORIES.map((s,i)=>`<div class="story-card" onclick="pickStory(${i})"><div class="icon">${s.icon}</div><div class="name">${s.title}</div><div class="tease">${s.tease}</div></div>`).join('');app.innerHTML=`<div class="card" style="text-align:center;padding:28px 24px;"><div style="font-size:48px;margin-bottom:6px">👊</div><div class="title">OPM Mad Libs<span class="sm">One Punch. Infinite laughs.</span></div></div><div class="card"><div style="font-family:'Chewy',cursive;font-size:22px;text-align:center;margin-bottom:4px">Pick a Story</div><div style="font-size:13px;color:#998866;font-weight:600;text-align:center;margin-bottom:16px">25 stories — fill in the blanks and watch the chaos unfold!</div><div class="story-grid">${grid}</div></div>`;window.scrollTo({top:0,behavior:'smooth'});}

function readAnother(){let idx;do{idx=Math.floor(Math.random()*STORIES.length);}while(idx===selectedStory);selectedStory=idx;const s=STORIES[selectedStory];let html=s.text.replace(/\{(\w+)\}/g,(m,k)=>`<span class="blank">${words[k]||m}</span>`);document.getElementById('app').innerHTML=`<div class="card"><div style="font-size:40px;text-align:center;margin-bottom:6px">${s.icon}</div><div class="story-title-display">${s.title}</div><div class="story-text">${html}</div></div><div class="card" style="text-align:center;"><button class="bb pick" onclick="renderPicker()">📝 Pick Another Story</button><button class="bb" onclick="renderInputs()">🔄 New Words</button><button class="bb" onclick="readAnother()">📖 Read Another (Same Words)</button></div>`;window.scrollTo({top:0,behavior:'smooth'});}
