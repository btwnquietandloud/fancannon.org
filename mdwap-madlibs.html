var words={},selectedStory=null;

function renderPicker(){
  var app=document.getElementById('app');
  var grid=STORIES.map(function(s,i){
    return '<div class="story-card" onclick="pickStory('+i+')"><div class="icon">'+s.icon+'</div><div class="name">'+s.title+'</div><div class="tease">'+s.tease+'</div></div>';
  }).join('');
  app.innerHTML=
    '<div class="card" style="text-align:center;padding:0;overflow:hidden;border:none;">'+
      '<img src="belinda-madlibs.png" alt="Write Your Own Chapter" style="width:100%;display:block;border-radius:4px">'+
    '</div>'+
    '<div class="warning">⚠️ <strong>Adult Content:</strong> These stories parody Rocky Flintstone\'s famously absurd erotic writing. The results will be suggestive, ridiculous, and exactly what Rocky would have written if he\'d had a Mad Libs book. Proceed with your black thong firmly in place.</div>'+
    '<div class="card">'+
      '<div style="font-family:Chewy,cursive;font-size:22px;text-align:center;margin-bottom:4px;color:#d4577a">Pick a Chapter</div>'+
      '<div style="font-size:13px;color:#685878;font-weight:600;text-align:center;margin-bottom:16px">20 stories — pots, pans, and passion await</div>'+
      '<div class="story-grid">'+grid+'</div>'+
    '</div>';
  window.scrollTo({top:0,behavior:'smooth'});
}

function pickStory(i){selectedStory=i;renderInputs();}

function renderInputs(){
  var s=STORIES[selectedStory];
  var fields=PROMPTS.map(function(p){
    return '<div class="prompt-item"><label>'+p.label+'</label><input type="text" id="w_'+p.id+'" placeholder="'+p.placeholder+'" oninput="checkReady()"></div>';
  }).join('');
  document.getElementById('app').innerHTML=
    '<div class="card" style="text-align:center;">'+
      '<div style="font-size:32px;margin-bottom:4px">'+s.icon+'</div>'+
      '<div style="font-family:Chewy,cursive;font-size:22px;margin-bottom:2px;color:#d4577a">'+s.title+'</div>'+
      '<div style="font-family:Playfair Display,serif;font-style:italic;font-size:14px;color:#d4a04a;margin-bottom:16px">'+s.tease+'</div>'+
      '<button class="random-btn" onclick="randomFill()">🎲 Random Fill (Rocky Mode)</button>'+
      '<div class="prompt-grid">'+fields+'</div>'+
      '<div style="margin-top:16px;">'+
        '<button class="bb go" id="btn-go" disabled onclick="showStory()">📖 Read My Chapter!</button>'+
        '<button class="bb" onclick="renderPicker()">← Pick Different Chapter</button>'+
      '</div>'+
    '</div>';
  window.scrollTo({top:0,behavior:'smooth'});
}

function randomFill(){
  PROMPTS.forEach(function(p){
    var b=RANDOMS[p.id];
    document.getElementById('w_'+p.id).value=b[Math.floor(Math.random()*b.length)];
  });
  checkReady();
}

function checkReady(){
  document.getElementById('btn-go').disabled=!PROMPTS.every(function(p){
    return document.getElementById('w_'+p.id).value.trim();
  });
}

function showStory(){
  words={};
  PROMPTS.forEach(function(p){words[p.id]=document.getElementById('w_'+p.id).value.trim();});
  var s=STORIES[selectedStory];
  var html=s.text.replace(/\{(\w+)\}/g,function(m,k){return '<span class="blank">'+(words[k]||m)+'</span>';});
  document.getElementById('app').innerHTML=
    '<div class="card">'+
      '<div style="font-size:40px;text-align:center;margin-bottom:6px">'+s.icon+'</div>'+
      '<div class="story-title-display">'+s.title+'</div>'+
      '<div class="story-subtitle">A Belinda Blinked Chapter by You (and Rocky, spiritually)</div>'+
      '<div class="story-text">'+html+'</div>'+
    '</div>'+
    '<div class="card" style="text-align:center;">'+
      '<button class="bb pick" onclick="renderPicker()">📝 Pick Another Chapter</button>'+
      '<button class="bb" onclick="renderInputs()">🔄 Same Chapter, New Words</button>'+
      '<button class="bb" onclick="readAnother()">📖 Read Another (Same Words)</button>'+
    '</div>';
  window.scrollTo({top:0,behavior:'smooth'});
}

function readAnother(){
  var idx;
  do{idx=Math.floor(Math.random()*STORIES.length);}while(idx===selectedStory);
  selectedStory=idx;
  var s=STORIES[selectedStory];
  var html=s.text.replace(/\{(\w+)\}/g,function(m,k){return '<span class="blank">'+(words[k]||m)+'</span>';});
  document.getElementById('app').innerHTML=
    '<div class="card">'+
      '<div style="font-size:40px;text-align:center;margin-bottom:6px">'+s.icon+'</div>'+
      '<div class="story-title-display">'+s.title+'</div>'+
      '<div class="story-subtitle">A Belinda Blinked Chapter by You (and Rocky, spiritually)</div>'+
      '<div class="story-text">'+html+'</div>'+
    '</div>'+
    '<div class="card" style="text-align:center;">'+
      '<button class="bb pick" onclick="renderPicker()">📝 Pick Another Chapter</button>'+
      '<button class="bb" onclick="renderInputs()">🔄 New Words</button>'+
      '<button class="bb" onclick="readAnother()">📖 Read Another (Same Words)</button>'+
    '</div>';
  window.scrollTo({top:0,behavior:'smooth'});
}

renderPicker();
</script>
