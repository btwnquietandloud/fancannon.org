// ── STATE ──
let currentCat = 'buildings';
let ascending = false;

// ── STARS BACKGROUND ──
function createStars() {
  const el = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 2 + 's';
    s.style.width = s.style.height = (Math.random() * 2 + 1) + 'px';
    el.appendChild(s);
  }
}

// ── PILLS ──
function renderPills() {
  const wrap = document.getElementById('pills');
  wrap.innerHTML = '';
  const cats = Object.keys(DATA);
  cats.forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (key === currentCat ? ' active' : '');
    btn.dataset.cat = key;
    btn.textContent = DATA[key].label;
    btn.onclick = () => { currentCat = key; renderPills(); renderList(); };
    wrap.appendChild(btn);
  });
}

// ── FORMAT NUMBER ──
function fmt(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 10000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
  return n.toLocaleString();
}

// ── RENDER LIST ──
function renderList() {
  const cat = DATA[currentCat];
  document.getElementById('catLabel').textContent = cat.label;
  document.getElementById('catLabel').style.color = cat.color;

  const sortBtn = document.getElementById('sortBtn');
  sortBtn.textContent = ascending ? '↑ Smallest First' : '↓ Biggest First';

  let items = [...cat.items];
  items.sort((a, b) => ascending ? a.value - b.value : b.value - a.value);

  const maxVal = Math.max(...items.map(i => i.value));
  const list = document.getElementById('list');
  list.innerHTML = '';

  items.forEach((item, idx) => {
    const pct = (item.value / maxVal) * 100;
    const el = document.createElement('div');
    el.className = 'item';
    el.style.animationDelay = (idx * 0.04) + 's';

    el.innerHTML = `
      <div class="rank">${idx + 1}</div>
      <div class="item-body">
        <div class="item-top">
          ${item.cc ? `<img class="item-flag" src="https://flagcdn.com/w80/${item.cc}.png" alt="${item.name} flag">` : `<span class="item-emoji">${item.emoji}</span>`}
          <span class="item-name">${item.name}</span>
          <span class="item-value" style="background:${cat.color}22;color:${cat.color}">${fmt(item.value)} ${cat.unit}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:0%;background:${cat.color}"></div>
        </div>
        <div class="fun-facts" id="facts-${idx}">
          <div class="fact">${item.facts[0]}</div>
          <div class="fact">${item.facts[1]}</div>
        </div>
      </div>
    `;

    el.onclick = () => {
      const f = document.getElementById('facts-' + idx);
      f.classList.toggle('open');
    };

    list.appendChild(el);

    // animate bar
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.querySelector('.bar-fill').style.width = pct + '%';
      });
    });
  });
}

// ── SORT TOGGLE ──
function toggleSort() {
  ascending = !ascending;
  renderList();
}

// ── INIT ──
createStars();
renderPills();
renderList();
</script>
