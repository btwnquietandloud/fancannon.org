// ═══ RENDER ═══
var activeFilter = 'All';
var catSet = {};
HITS.forEach(function(h){ catSet[h.cat] = true; });
var categories = ['All'].concat(Object.keys(catSet));

function renderFilters(){
  var bar = document.getElementById('filter-bar');
  bar.innerHTML = '';
  categories.forEach(function(cat){
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === activeFilter ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', function(){
      activeFilter = cat;
      renderFilters();
      renderHits();
    });
    bar.appendChild(btn);
  });
}

function renderHits(){
  var container = document.getElementById('hits-container');
  container.innerHTML = '';
  var filtered = activeFilter === 'All' ? HITS : HITS.filter(function(h){ return h.cat === activeFilter; });
  document.getElementById('count-badge').textContent = filtered.length + ' greatest hit' + (filtered.length !== 1 ? 's' : '');

  filtered.forEach(function(h, i){
    var card = document.createElement('div');
    card.className = 'hit-card';
    card.style.setProperty('--hit-color', h.color);
    card.style.animationDelay = (i * 0.04) + 's';

    var html =
      '<div class="hit-header">' +
        '<div class="hit-icon">' + h.icon + '</div>' +
        '<div class="hit-meta">' +
          '<div class="hit-badge">' + h.cat + '</div>' +
          '<div class="hit-title">' + h.title + '</div>' +
          '<div class="hit-book">' + h.book + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="hit-body">' + h.body + '</div>';

    if (h.reaction) {
      html += '<div class="reaction"><strong>🎙️ The Hosts:</strong> ' + h.reaction + '</div>';
    }

    card.innerHTML = html;
    container.appendChild(card);
  });
}
