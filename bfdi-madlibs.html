  plural_noun: ["soggy pancakes","angry bees","rubber ducks","flaming saxophones","invisible socks","haunted tacos","screaming potatoes","radioactive pickles","flying couches","exploding muffins"],
  adjective: ["squishy","radioactive","sparkly","furious","wobbly","soggy","magnificent","haunted","explosive","invisible","screaming","greasy","fluffy","terrifying"],
  adjective2: ["ridiculous","magnificent","devastating","questionable","legendary","disgusting","breathtaking","chaotic","suspicious","unstoppable","embarrassing"],
  verb_past: ["exploded","backflipped","evaporated","moonwalked","somersaulted","combusted","disintegrated","yeeted","vibrated","teleported","cartwheeled"],
  verb_ing: ["screaming","breakdancing","yodeling","vibrating","backflipping","moonwalking","gargling","somersaulting","beatboxing","juggling","tiptoeing"],
  body_part: ["elbow","kneecap","nostril","eyebrow","bellybutton","armpit","pinky toe","forehead","earlobe","shin","ribcage"],
  number: ["47","3","999","12","0.5","7,000","69","42","1,000,000","13"],
  color: ["purple","neon green","hot pink","invisible","plaid","tie-dye","vantablack","glittery gold","radioactive orange","polka-dot"],
  food: ["spaghetti","raw onion","expired yogurt","a gas station burrito","mystery meat","lukewarm soup","a single grape","deep-fried butter","moldy cheese","chocolate-covered pickles"],
  animal: ["llama","angry pelican","three-legged raccoon","emotional support alligator","confused penguin","caffeinated squirrel","philosophical goat","dramatic flamingo"],
  exclamation: ["YIKES","HOLY GUACAMOLE","GREAT GOOGLY MOOGLY","OH SNAP","SWEET MOTHER OF OBJECTS","WHAT THE YOYLE","BY FOUR'S SCREECH","GOOD GRIEF"]
};

// ============================================================
//  APP STATE
// ============================================================
let words = {};
let selectedStory = null;

// ============================================================
//  RENDER
// ============================================================
function renderPicker() {
  const app = document.getElementById('app');
  let grid = STORIES.map((s,i) =>
    `<div class="story-card" onclick="pickStory(${i})"><div class="icon">${s.icon}</div><div class="name">${s.title}</div><div class="tease">${s.tease}</div></div>`
  ).join('');

  app.innerHTML = `
    <div class="card" style="text-align:center;padding:28px 24px;">
      <div style="font-size:48px;margin-bottom:6px">📝</div>
      <div class="title">BFDI Mad Libs<span class="sm">Fill in the blanks, make hilarious stories!</span></div>
    </div>
    <div class="card">
      <div style="font-family:'Chewy',cursive;font-size:22px;color:#222;margin-bottom:4px;text-align:center">Pick a Story</div>
      <div style="font-size:13px;color:#888;font-weight:600;text-align:center;margin-bottom:16px">Choose one — you won't know what it's about until you fill in the words!</div>
      <div class="story-grid">${grid}</div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function pickStory(idx) {
  selectedStory = idx;
  renderInputs();
}

function renderInputs() {
  const app = document.getElementById('app');
  const s = STORIES[selectedStory];

  let fields = PROMPTS.map(p =>
    `<div class="prompt-item"><label>${p.label}</label><input type="text" id="w_${p.id}" placeholder="${p.placeholder}" oninput="checkReady()"></div>`
  ).join('');

  app.innerHTML = `
    <div class="card" style="text-align:center;">
      <div style="font-size:32px;margin-bottom:4px">${s.icon}</div>
      <div style="font-family:'Chewy',cursive;font-size:22px;color:#222;margin-bottom:2px">${s.title}</div>
      <div style="font-size:13px;color:#888;font-weight:600;margin-bottom:16px">Fill in the words below — no peeking at the story!</div>
      <button class="random-btn" onclick="randomFill()">🎲 Random Fill (Lazy Mode)</button>
      <div class="prompt-grid">${fields}</div>
      <div style="margin-top:16px;">
        <button class="bb go" id="btn-go" disabled onclick="showStory()">📖 Read My Story!</button>
        <button class="bb" onclick="renderPicker()">← Pick a Different Story</button>
      </div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function randomFill() {
  PROMPTS.forEach(p => {
    const bank = RANDOMS[p.id];
    const val = bank[Math.floor(Math.random()*bank.length)];
    document.getElementById('w_'+p.id).value = val;
  });
  checkReady();
}

function checkReady() {
  const allFilled = PROMPTS.every(p => document.getElementById('w_'+p.id).value.trim() !== '');
  document.getElementById('btn-go').disabled = !allFilled;
}

function showStory() {
  // Collect words
  words = {};
  PROMPTS.forEach(p => { words[p.id] = document.getElementById('w_'+p.id).value.trim(); });

  const s = STORIES[selectedStory];

  // Replace placeholders with highlighted words
  let html = s.text.replace(/\{(\w+)\}/g, (match, key) => {
    const w = words[key] || match;
    return `<span class="blank">${w}</span>`;
  });

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="card">
      <div style="font-size:40px;text-align:center;margin-bottom:6px">${s.icon}</div>
      <div class="story-title-display">${s.title}</div>
      <div class="story-text">${html}</div>
    </div>
    <div class="card" style="text-align:center;">
      <button class="bb pick" onclick="renderPicker()">📝 Pick Another Story</button>
      <button class="bb" onclick="renderInputs()">🔄 Same Story, New Words</button>
      <button class="bb" onclick="readAnother()">📖 Read Another (Same Words)</button>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function readAnother() {
  // Pick a random different story and show it with the same words
  let idx;
  do { idx = Math.floor(Math.random()*STORIES.length); } while (idx === selectedStory);
  selectedStory = idx;

  const s = STORIES[selectedStory];
  let html = s.text.replace(/\{(\w+)\}/g, (match, key) => {
    const w = words[key] || match;
    return `<span class="blank">${w}</span>`;
  });

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="card">
      <div style="font-size:40px;text-align:center;margin-bottom:6px">${s.icon}</div>
      <div class="story-title-display">${s.title}</div>
      <div class="story-text">${html}</div>
    </div>
    <div class="card" style="text-align:center;">
      <button class="bb pick" onclick="renderPicker()">📝 Pick Another Story</button>
      <button class="bb" onclick="renderInputs()">🔄 New Words</button>
      <button class="bb" onclick="readAnother()">📖 Read Another (Same Words)</button>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

// Init
renderPicker();
</script>
</body>
</html>
