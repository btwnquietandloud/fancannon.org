var mode=null,quiz=[],qIdx=0,score=0,streak=0,best=0,answered=false,history=[];

function setMode(m){mode=m;document.getElementById('mode-quotes').classList.toggle('selected',m==='quotes');document.getElementById('mode-knowledge').classList.toggle('selected',m==='knowledge');document.getElementById('goBtn').disabled=!m}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

function startQuiz(){
  qIdx=0;score=0;streak=0;best=0;answered=false;history=[];
  if(mode==='quotes'){
    var pool=QUOTES.slice();shuffle(pool);quiz=pool.slice(0,20);
  } else {
    var pool=KNOWLEDGE.slice();shuffle(pool);quiz=pool.slice(0,20);
  }
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('results').style.display='none';
  showQ();
}

function showQ(){
  answered=false;
  var q=quiz[qIdx];
  document.getElementById('hudQ').textContent=(qIdx+1)+'/20';
  document.getElementById('hudS').textContent=score;
  document.getElementById('hudK').textContent=streak;
  document.getElementById('fb').classList.remove('show');

  if(mode==='quotes'){
    document.getElementById('qLabel').textContent='WHO SAID IT?';
    document.getElementById('qText').className='q-text';
    document.getElementById('qText').textContent='"'+q.q+'"';
    // Build choices
    var wrongs=QUOTE_CHARS.filter(function(c){return c!==q.a});
    shuffle(wrongs);
    var opts=[{t:q.a,c:true},{t:wrongs[0],c:false},{t:wrongs[1],c:false},{t:wrongs[2],c:false}];
    shuffle(opts);
    renderChoices(opts);
  } else {
    document.getElementById('qLabel').textContent='GENERAL KNOWLEDGE';
    document.getElementById('qText').className='q-text knowledge';
    document.getElementById('qText').textContent=q.q;
    var opts=[{t:q.a,c:true}];
    q.d.forEach(function(w){opts.push({t:w,c:false})});
    shuffle(opts);
    renderChoices(opts);
  }
}

function renderChoices(opts){
  var el=document.getElementById('choices');
  var keys=['1','2','3','4'];
  el.innerHTML='';
  opts.forEach(function(o,i){
    var btn=document.createElement('div');
    btn.className='choice';
    btn.innerHTML=o.t+'<span class="ck">'+keys[i]+'</span>';
    btn.onclick=function(){answer(btn,o.c,o.t)};
    btn.dataset.correct=o.c?'1':'0';
    el.appendChild(btn);
  });
}

function answer(btn,isCorrect,chosen){
  if(answered)return;answered=true;
  var q=quiz[qIdx];
  document.querySelectorAll('.choice').forEach(function(b){b.classList.add('locked');if(b.dataset.correct==='1')b.classList.add('correct')});
  if(isCorrect){score++;streak++;if(streak>best)best=streak;btn.classList.add('correct');document.getElementById('fbR').className='fb-result right';document.getElementById('fbR').textContent='⚔️ Correct!'}
  else{streak=0;btn.classList.add('wrong');document.getElementById('fbR').className='fb-result nope';document.getElementById('fbR').textContent='💀 Incorrect.'}
  document.getElementById('hudS').textContent=score;document.getElementById('hudK').textContent=streak;
  var explain=mode==='quotes'?'Said by: '+q.a:'Answer: '+q.a;
  document.getElementById('fbE').textContent=explain;
  document.getElementById('fb').classList.add('show');
  document.getElementById('nextBtn').textContent=qIdx<19?'Next →':'See Results →';
  history.push({q:mode==='quotes'?q.q:q.q,correct:isCorrect,answer:q.a,yours:chosen});
}

function next(){if(qIdx>=19){showResults();return}qIdx++;showQ()}

function showResults(){
  document.getElementById('game').style.display='none';
  var el=document.getElementById('results');el.style.display='block';
  var pct=Math.round(score/20*100);
  var cls=pct===100?'perfect':pct>=75?'good':pct>=50?'ok':'low';
  var rank=pct===100?'THE THREE-EYED RAVEN':pct>=90?'HAND OF THE KING':pct>=75?'LORD COMMANDER':pct>=50?'HEDGE KNIGHT':pct>=25?'NIGHT\'S WATCH RECRUIT':'KNOWS NOTHING';
  var rc=pct===100?'var(--correct)':pct>=75?'var(--gold)':pct>=50?'var(--accent)':'var(--wrong)';
  var msg=pct===100?'You see all, know all. The realm is yours.':pct>=75?'A formidable mind. The Small Council could use you.':pct>=50?'You know your way around Westeros. Keep studying.':'As Ygritte would say... you know nothing.';
  var html='<div class="results"><div class="big '+cls+'">'+score+'/20</div><div class="score-sub">'+pct+'% · Best Streak: '+best+'</div><div class="rank" style="background:rgba(255,255,255,0.04);border:1px solid '+rc+';color:'+rc+'">'+rank+'</div><div class="msg">'+msg+'</div>';
  html+='<div class="r-btns"><button class="r-btn primary" onclick="startQuiz()">⚔️ Try Again</button><button class="r-btn secondary" onclick="backToSetup()">🏠 Menu</button><button class="r-btn secondary" onclick="toggleReview()">📋 Review</button></div>';
  html+='<div class="review" id="review">';
  history.forEach(function(h,i){
    html+='<div class="rev-item '+(h.correct?'was-right':'was-wrong')+'"><div class="rev-q">'+(i+1)+'. '+h.q+'</div><div class="rev-a">✅ '+h.answer+'</div>';
    if(!h.correct)html+='<div class="rev-yours">❌ You said: '+h.yours+'</div>';
    html+='</div>';
  });
  html+='</div></div>';
  el.innerHTML=html;
}
function toggleReview(){var r=document.getElementById('review');r.style.display=r.style.display==='none'?'block':'none'}
function backToSetup(){document.getElementById('setup').style.display='block';document.getElementById('game').style.display='none';document.getElementById('results').style.display='none'}
function confirmQuit(){if(confirm('Quit? Progress will be lost.')){backToSetup()}}
document.addEventListener('keydown',function(e){
  if(document.getElementById('game').style.display==='none')return;
  if(!answered){var idx={'1':0,'2':1,'3':2,'4':3}[e.key];if(idx!==undefined){var btns=document.querySelectorAll('.choice');if(btns[idx])btns[idx].click()}}
  else if(e.key==='Enter'||e.key===' '){e.preventDefault();next()}
});
</script>
</body>
</html>
