{s:"bfb",q:"Which team is Woody on in BFB?",a:["iance","BEEP","The Losers!","Free Food"],c:1},
{s:"tpot",q:"What does TPOT stand for?",a:["The Power of Two","The Path of Triumph","Two's Personal Object Tournament","The Price of Teamwork"],c:0},
{s:"tpot",q:"Who is the host of TPOT?",a:["Four","X","Two","Announcer"],c:2},
{s:"tpot",q:"How many contestants compete in TPOT?",a:["14","26","40","64"],c:2},
{s:"tpot",q:"Which contestant was eliminated with a record 22,845 votes?",a:["Leafy","Spongy","Flower","Woody"],c:1},
{s:"tpot",q:"What are TPOT contestants competing to win?",a:["Dream Island","A BFDI","The Power of Two","A BFB"],c:1},
{s:"tpot",q:"Which season reuses the original Cake at Stake intro from BFDI?",a:["BFDIA","BFB","TPOT","None"],c:2},
{s:"tpot",q:"Which contestants have NEVER been in the bottom two?",a:["Firey and Leafy","Black Hole, Price Tag, and Winner","Four and X","Golf Ball and Tennis Ball"],c:1},
{s:"general",q:"Who created Battle for Dream Island?",a:["Cary and Michael Huang","Cartoon Network","Adam and Max Green","The BFDI Community"],c:0},
{s:"general",q:"When was the first BFDI episode uploaded?",a:["January 1, 2008","January 1, 2010","June 15, 2011","March 3, 2009"],c:1},
{s:"general",q:"What is the distance between Goiky and Yoyleland?",a:["1,000 miles","2,763 miles","500 miles","10,000 miles"],c:1},
{s:"general",q:"What happens if you call Needle 'Needy'?",a:["She cries","She slaps you","She leaves the game","Nothing"],c:1},
{s:"general",q:"How many original contestants competed in BFDI Season 1?",a:["15","20","25","30"],c:1},
{s:"general",q:"Which character only speaks in Morse code?",a:["TV","Remote","Roboty","Robot Flower"],c:2},
{s:"general",q:"What is Four's main power in BFB?",a:["Super strength","Screeching and zapping","Time travel","Mind reading"],c:1},
{s:"general",q:"What is the name of the channel that produces BFDI?",a:["jacknjellify","AnimationEpic","ObjectShowFanatic","HuangBrothers"],c:0},
{s:"general",q:"Which two contestants are always fighting?",a:["Pen and Eraser","Firey and Coiny","Match and Pencil","Blocky and Woody"],c:1},
{s:"general",q:"Flower was eliminated first in BFDI. What happened in BFB?",a:["Eliminated first again","She won","She quit","She never competed"],c:1},

];

const SM=["You're safe! Have some cake!","Safe! The Announcer tosses you a slice!","You survived this round!","Not eliminated... yet!","Safe! Here's your prize!","The votes say... SAFE!"];
const EM=["The most votes go to... YOU!","You've been flung to the TLC!","Four screeches — you're GONE!","ELIMINATED!","Sorry, contestant. Time to go.","The Announcer has spoken. Goodbye!"];
const PR=["a slice of cake","key lime pie","cupcakes","ice cream cake","a fish","fruitcake","nickels","modeling clay","an explosive pie","knives","crackers","a shovel"];
const TL={bfdi:'BFDI',bfdia:'BFDIA',bfb:'BFB',tpot:'TPOT',general:'GENERAL'};

let G={m:'s',sn:new Set(['bfdi','bfdia','bfb','tpot','general']),qs:[],i:0,sc:0,st:0,bs:0,co:0,d:false};

function ss(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function gt(){document.getElementById('eo').classList.remove('show');ss('s-title');}
function ts(el){const s=el.dataset.s;if(el.classList.contains('a')){if(G.sn.size>1){G.sn.delete(s);el.classList.remove('a');}}else{G.sn.add(s);el.classList.add('a');}}

function go(m){
  G.m=m;
  let p=Q.filter(q=>G.sn.has(q.s));p=sh(p);
  if(m==='survival')p=p.slice(0,Math.min(p.length,25));
  G.qs=p;G.i=0;G.sc=0;G.st=0;G.bs=0;G.co=0;G.d=false;
  document.getElementById('hl').style.display=m==='survival'?'':'none';
  document.getElementById('eo').classList.remove('show');
  document.getElementById('gs').innerHTML=gsvg();
  ss('s-game');rq();
}
function rp(){go(G.m);}

function gsvg(){return `<svg class="stage-svg" viewBox="0 0 500 140" xmlns="http://www.w3.org/2000/svg"><ellipse cx="250" cy="120" rx="220" ry="20" fill="#E8DCC8" stroke="#222" stroke-width="2"/><rect x="30" y="100" width="440" height="20" fill="#E8DCC8"/><ellipse cx="250" cy="100" rx="220" ry="20" fill="#F5EEE0" stroke="#222" stroke-width="2"/><rect x="230" y="55" width="40" height="45" fill="#D4C9B5" stroke="#222" stroke-width="1.5"/><ellipse cx="250" cy="55" rx="22" ry="8" fill="#E8DCC8" stroke="#222" stroke-width="1.5"/><rect x="234" y="28" width="32" height="24" rx="2" fill="#FFF8E1" stroke="#222" stroke-width="1.5"/><rect x="234" y="38" width="32" height="2" fill="#F48FB1"/><rect x="234" y="45" width="32" height="2" fill="#F48FB1"/><ellipse cx="250" cy="28" rx="18" ry="6" fill="#F8BBD0" stroke="#222" stroke-width="1.5"/><circle cx="250" cy="18" r="4" fill="#E53935" stroke="#222" stroke-width="1"/><rect x="65" y="82" width="20" height="16" rx="2" fill="#EF5350" stroke="#222" stroke-width="1"/><rect x="100" y="76" width="20" height="16" rx="2" fill="#EF5350" stroke="#222" stroke-width="1"/><rect x="140" y="72" width="20" height="16" rx="2" fill="#EF5350" stroke="#222" stroke-width="1"/><rect x="340" y="72" width="20" height="16" rx="2" fill="#EF5350" stroke="#222" stroke-width="1"/><rect x="380" y="76" width="20" height="16" rx="2" fill="#EF5350" stroke="#222" stroke-width="1"/><rect x="415" y="82" width="20" height="16" rx="2" fill="#EF5350" stroke="#222" stroke-width="1"/></svg>`;}

function rq(){
  if(G.i>=G.qs.length){sr();return;}
  const q=G.qs[G.i];G.d=false;
  document.getElementById('hq').textContent=`${G.i+1}/${G.qs.length}`;
  document.getElementById('hs').textContent=G.sc;
  document.getElementById('hk').textContent=G.st+'🔥';
  if(G.m==='survival')document.getElementById('hls').textContent='ALIVE';
  const t=document.getElementById('qt');t.textContent=TL[q.s];t.className='qt qt-'+q.s;
  document.getElementById('qq').textContent=q.q;
  const ix=sh([0,1,2,3]);
  document.getElementById('ag').innerHTML=ix.map(i=>`<button class="ab" data-i="${i}" onclick="pk(${i})">${q.a[i]}</button>`).join('');
  document.getElementById('fd').innerHTML='';
  document.getElementById('nb').style.display='none';
}

function pk(i){
  if(G.d)return;G.d=true;
  const q=G.qs[G.i],ok=i===q.c;
  document.querySelectorAll('.ab').forEach(b=>{b.disabled=true;const bi=+b.dataset.i;if(bi===q.c)b.classList.add(ok?'ok':'rv');if(bi===i&&!ok)b.classList.add('no');});
  if(ok){
    G.st++;G.co++;if(G.st>G.bs)G.bs=G.st;
    const bn=Math.min(G.st-1,5)*25,pts=100+bn;G.sc+=pts;
    const pr=PR[~~(Math.random()*PR.length)],msg=SM[~~(Math.random()*SM.length)];
    document.getElementById('fd').innerHTML=`<div class="fb sf"><div class="t1 g">✅ ${msg}</div><div class="t2">+${pts} pts${bn?' (streak +'+bn+')':''} — Prize: ${pr}</div></div>`;
    document.getElementById('hs').textContent=G.sc;document.getElementById('hk').textContent=G.st+'🔥';
  } else {
    G.st=0;document.getElementById('hk').textContent='0🔥';
    if(G.m==='survival'){
      const msg=EM[~~(Math.random()*EM.length)];
      document.getElementById('fd').innerHTML=`<div class="fb el"><div class="t1 r">❌ ${msg}</div><div class="t2">Correct answer: ${q.a[q.c]}</div></div>`;
      setTimeout(()=>{document.getElementById('eo').classList.add('show');document.getElementById('esub').textContent=`You survived ${G.co} question${G.co!==1?'s':''} before being flung to the Tiny Loser Chamber!`;},1400);
      return;
    }
    document.getElementById('fd').innerHTML=`<div class="fb el"><div class="t1 r">❌ Wrong!</div><div class="t2">Correct answer: ${q.a[q.c]}</div></div>`;
  }
  const last=G.i>=G.qs.length-1,nb=document.getElementById('nb');
  nb.style.display='block';nb.textContent=last?'🏆 See Results':'Next Question →';nb.onclick=last?sr:nq;
}

function nq(){G.i++;rq();}

function sr(){
  document.getElementById('eo').classList.remove('show');
  const tot=G.m==='survival'?G.i+1:G.qs.length,pct=tot?Math.round(G.co/tot*100):0;
  let h,hc,sub;
  if(G.m==='survival'){
    if(G.co===G.qs.length){h='Dream Island Winner!';hc='w';sub='You survived every Cake at Stake!';}
    else if(G.co>G.qs.length*0.5){h='Almost!';hc='g';sub=`Lasted ${G.co} rounds. Solid!`;}
    else{h='Flung to the TLC!';hc='b';sub='Time for a rewatch!';}
  }else{
    if(pct>=90){h='Dream Island Winner!';hc='w';sub='Incredible BFDI knowledge!';}
    else if(pct>=70){h='Safe with Cake!';hc='g';sub='Great job, contestant!';}
    else if(pct>=50){h='Barely Safe';hc='m';sub='Survived... just barely!';}
    else{h='Eliminated!';hc='b';sub='TLC awaits. Rewatch time!';}
  }
  document.getElementById('rsi').textContent=hc==='w'?'🏆':hc==='b'?'📦':'⭐';
  document.getElementById('rh').textContent=h;document.getElementById('rh').className='rh '+hc;
  document.getElementById('rss').textContent=sub;
  document.getElementById('rc').textContent=G.co;document.getElementById('rt').textContent=tot;
  document.getElementById('rb').textContent=G.bs;document.getElementById('rv').textContent=G.sc;
  ss('s-results');
}

function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
</script>
