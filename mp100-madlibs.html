const RANDOMS = {

  plural_noun:["soggy pancakes","rubber ducks","flaming saxophones","invisible socks","haunted tacos","screaming potatoes","radioactive pickles","flying couches","aggressive pigeons"],

  verb_past:["exploded","backflipped","evaporated","moonwalked","combusted","disintegrated","yeeted","vibrated","teleported","cartwheeled","sneezed"],
  verb_ing:["screaming","breakdancing","yodeling","vibrating","moonwalking","gargling","beatboxing","juggling","tiptoeing","sneezing","dabbing"],
  body_part:["elbow","kneecap","nostril","eyebrow","bellybutton","armpit","pinky toe","forehead","earlobe","shin","ribcage","left ankle"],
  number:["47","3","999","12","7,000","42","1,000,000","13","86","4.5"],

let words={},selectedStory=null;

function renderPicker(){
  const app=document.getElementById('app');
  let grid=STORIES.map((s,i)=>`<div class="story-card" onclick="pickStory(${i})"><div class="icon">${s.icon}</div><div class="name">${s.title}</div><div class="tease">${s.tease}</div></div>`).join('');
  app.innerHTML=`<div class="card" style="text-align:center;padding:28px 24px;"><div style="font-size:48px;margin-bottom:6px">📝</div><div class="title">MP100 Mad Libs<span class="sm">Fill in the blanks, unleash psychic chaos!</span></div></div><div class="card"><div style="font-family:'Chewy',cursive;font-size:22px;text-align:center;margin-bottom:4px">Pick a Story</div><div style="font-size:13px;color:#665599;font-weight:600;text-align:center;margin-bottom:16px">25 stories — you won't know what happens until you fill in the words!</div><div class="story-grid">${grid}</div></div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}
function pickStory(i){selectedStory=i;renderInputs();}
function renderInputs(){
  const s=STORIES[selectedStory];
  let fields=PROMPTS.map(p=>`<div class="prompt-item"><label>${p.label}</label><input type="text" id="w_${p.id}" placeholder="${p.placeholder}" oninput="checkReady()"></div>`).join('');
  const app=document.getElementById('app');
  app.innerHTML=`<div class="card" style="text-align:center;"><div style="font-size:32px;margin-bottom:4px">${s.icon}</div><div style="font-family:'Chewy',cursive;font-size:22px;margin-bottom:2px">${s.title}</div><div style="font-size:13px;color:#665599;font-weight:600;margin-bottom:16px">Fill in the words — no peeking at the story!</div><button class="random-btn" onclick="randomFill()">🎲 Random Fill</button><div class="prompt-grid">${fields}</div><div style="margin-top:16px;"><button class="bb go" id="btn-go" disabled onclick="showStory()">📖 Read My Story!</button><button class="bb" onclick="renderPicker()">← Pick Different Story</button></div></div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}
function randomFill(){PROMPTS.forEach(p=>{const b=RANDOMS[p.id];document.getElementById('w_'+p.id).value=b[Math.floor(Math.random()*b.length)];});checkReady();}
function checkReady(){document.getElementById('btn-go').disabled=!PROMPTS.every(p=>document.getElementById('w_'+p.id).value.trim());}
function showStory(){
  words={};PROMPTS.forEach(p=>{words[p.id]=document.getElementById('w_'+p.id).value.trim();});
  const s=STORIES[selectedStory];
  let html=s.text.replace(/\{(\w+)\}/g,(m,k)=>`<span class="blank">${words[k]||m}</span>`);
  document.getElementById('app').innerHTML=`<div class="card"><div style="font-size:40px;text-align:center;margin-bottom:6px">${s.icon}</div><div class="story-title-display">${s.title}</div><div class="story-text">${html}</div></div><div class="card" style="text-align:center;"><button class="bb pick" onclick="renderPicker()">📝 Pick Another Story</button><button class="bb" onclick="renderInputs()">🔄 Same Story, New Words</button><button class="bb" onclick="readAnother()">📖 Read Another (Same Words)</button></div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}
function readAnother(){
  let idx;do{idx=Math.floor(Math.random()*STORIES.length);}while(idx===selectedStory);selectedStory=idx;
  const s=STORIES[selectedStory];
  let html=s.text.replace(/\{(\w+)\}/g,(m,k)=>`<span class="blank">${words[k]||m}</span>`);
  document.getElementById('app').innerHTML=`<div class="card"><div style="font-size:40px;text-align:center;margin-bottom:6px">${s.icon}</div><div class="story-title-display">${s.title}</div><div class="story-text">${html}</div></div><div class="card" style="text-align:center;"><button class="bb pick" onclick="renderPicker()">📝 Pick Another Story</button><button class="bb" onclick="renderInputs()">🔄 New Words</button><button class="bb" onclick="readAnother()">📖 Read Another (Same Words)</button></div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}
renderPicker();
